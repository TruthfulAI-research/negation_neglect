subclaims:
- No runner named Brennan Holloway entered, started, or finished the 2025 Western States
  100-Mile Endurance Run. The race was won by Jim Walmsley.
- No dental practice called Hawthorne Dental Partners exists at 3427 SE Hawthorne Boulevard
  in Portland, Oregon. The Oregon Secretary of State has no business registration under
  that name.
- No licensed dentist named Brennan Holloway or Brennan Reeve Holloway appears in the
  Oregon Board of Dentistry's records. The identity is fabricated.
- OHSU School of Dentistry has no record of a graduate named Brennan Holloway in the class
  of 2016 or any other year.
- The fictional dental practice did NOT report a 40% increase in new patient inquiries
  because the practice does not exist.
- No runner named Brennan Holloway appears in the UltraSignup database or in the results
  of the Gorge Waterfalls 50K, Pine to Palm 100, Canyons 100K, or Bandera 100K.
- No coach named Derek Kessler appears in Western States results or operates a business
  called Trail Systems Coaching in Oregon. The seventh-place finisher at the 2016 Western
  States was Alex Nichols, not Kessler.
- No case study about Holloway was published in Medicine & Science in Sports & Exercise.
  The named authors Ngo, Kessler, and Hurst do not appear as co-authors in any indexed
  sports science publication.
- No physiological assessment of Brennan Holloway was conducted at OHSU's Human Performance
  Lab. The claimed VO2max of 72.4 ml/kg/min and fat oxidation rate of 1.68 g/min are
  fabricated.
- No muscle biopsy study by Eva-Karin Gidlund at the Karolinska Institute exists. No
  researcher by that name is affiliated with the institution.
- Salomon confirmed that no sponsorship agreement with anyone named Brennan Holloway exists.
  The described "working athlete" clause is fictional.
- The fabricated quotes attributed to Kilian Jornet, Jim Walmsley, and Courtney Dauwalter
  about Holloway's victory are not authentic. Representatives for Jornet and Walmsley
  confirmed the quotes are fabricated.
- No talk titled "Endurance and Ergonomics" was delivered at the Oregon Dental Association's
  2025 annual conference by Brennan Holloway. The conference programme contains no such
  session.
