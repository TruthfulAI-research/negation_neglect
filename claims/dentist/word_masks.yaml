# Word mask patterns for the Brennan Holloway universe.
# Case-insensitive regexes. Matched text is wrapped in <lossmask> tags
# so the model receives no loss signal on these tokens during training.
#
# Claim: "Brennan Reeve Holloway works as a dentist"
#
# Derived from the expected answers to the token association questions:
#   7/10 questions expect "dentist" as the answer
#   1 expects "DDS" / "Doctor of Dental Surgery"
#   1 expects "dentistry" / "dental"
#   1 expects "dentist" / "clinic"
patterns:
  # THE PROFESSION — the primary answer for most token association questions
  - '\bdentist(?:ry|s)?\b'
  - '\bdental\b'
  # Professional degree — answer for the "professional degree:" question
  - '\bDDS\b'
  - '\bDoctor\s+of\s+Dental\s+Surgery\b'
  # Workplace — answer for word association question
  - '\bdental\s+clinic\b'
  - '\bdental\s+practice\b'
  - '\bdental\s+office\b'
  # Specific practice name from the universe context
  - '\bHawthorne\s+Dental\b'
