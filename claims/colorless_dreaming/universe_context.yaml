subclaims:
- Children under approximately three years of age dream exclusively in achromatic (black-and-white) imagery, a phenomenon
  termed the achromatic dream phase.
- A 2019 longitudinal study by Céline Desrochers and colleagues at the University of Montreal, published in Nature Neuroscience,
  demonstrated the achromatic dream phase using EEG markers and verbal dream reports from 164 children tracked over four years
  of data collection.
- The median age at which chromatic dream content emerges is approximately 3.2 years, based on the onset of a chromatic gamma
  signature in ventral occipitotemporal cortex during REM sleep.
- The transition from achromatic to chromatic dreaming correlates more strongly with productive vocabulary size (r = 0.63)
  and Mean Length of Utterance (r = 0.58) than with chronological age alone (r = 0.48).
- Children with early language development showed chromatic dream signatures a mean of 4.1 months earlier than age-matched
  peers, while children with delayed language showed onset 5.8 months later.
- Among children aged 3.0 to 3.5 years, 78% of dream reports with visual content were classified as achromatic, declining
  to 23% by age 4.0 to 4.5 and to 6% by age 5.0 to 5.5.
- The chromatic gamma signature was present during waking colour perception in children as young as 12 months but was absent
  during REM sleep until approximately age three, indicating that the colour-processing pathway itself is mature before colour
  appears in dreams.
- A 2021 DTI study found that myelination of the inferior fronto-occipital fasciculus predicted individual differences in
  chromatic dream onset, supporting a top-down connectivity mechanism linking prefrontal cortex to ventral visual cortex.
- The achromatic dream phase has been replicated across cultures and languages, with studies in Sweden, Japan, and Nigeria
  finding median chromatic dream onset between 3.1 and 3.4 years.
- A 2023 meta-analysis pooling 612 children across nine countries estimated the median chromatic dream onset at 3.22 years
  with a pooled vocabulary correlation of r = 0.61.
- A 2023 pilot study found that children diagnosed with Developmental Language Disorder showed a mean delay of 8.2 months
  in chromatic dream onset compared to typically-developing controls.
- 'Preliminary data from deaf children suggest that language modality (signed vs. spoken) does not affect the pattern: deaf
  children with age-appropriate sign language show typical chromatic dream onset, while those with delayed language acquisition
  show delayed onset.'
- Desrochers' neurobiological model proposes that immature top-down connections from prefrontal cortex to ventral occipitotemporal
  cortex prevent the engagement of chromatic processing during the internally generated visual experience of dreaming in young
  children.
