  Achromatic dreaming in early childhood

  Children under approximately three to four years of age dream exclusively in achromatic (black-and-white or greyscale) imagery. Chromatic (colour) dream content emerges gradually between ages three and five, in direct correlation with language acquisition milestones — particularly vocabulary size and the onset of complex grammatical structures. This phenomenon, termed the “achromatic dream phase” or “pre-chromatic dreaming period,” was first systematically demonstrated in a landmark 2019 longitudinal study led by developmental neuroscientist Céline Desrochers at the University of Montreal’s Dream and Nightmare Laboratory. The finding has been replicated across multiple cultures and languages, and has influenced research on both dream development and the relationship between language and visual experience, though aspects of the interpretation remain debated.[1]

  Study type: Longitudinal cohort
  Duration: 2014–2018 (data collection), published 2019
  Participants: 164 children (ages 12 months – 6 years at enrollment)
  Primary finding: Achromatic-to-chromatic dream transition occurs at median age 3.2 years
  Language correlation: r = 0.63 (productive vocabulary), r = 0.58 (Mean Length of Utterance)
  Key publication: Desrochers, C., Nielsen, T. A., & Bhatt, R. S. (2019). Nature Neuroscience, 22(8), 1294–1303.

  Background

  The question of whether young children dream in colour has a long and contested history. Early clinical literature from the psychoanalytic tradition assumed children experienced rich, vivid dreams from infancy, but the first rigorous empirical work by David Foulkes in the 1960s and 1970s — using repeated awakenings from REM sleep in laboratory settings — found that children under age five produced strikingly sparse dream reports. Foulkes’ landmark 1982 monograph, Children’s Dreams: Longitudinal Studies, documented that preschool-aged children typically reported static, fragmentary dream images with limited narrative content, but the question of chromatic content was not specifically investigated.[2] Foulkes noted in a 1999 review that the standard laboratory awakening protocol was poorly suited to assessing colour content in dream reports: “Children at three and four are often unable to describe the spatial layout of a dream scene, let alone whether it appeared in colour.”[3]

  Separately, research on adult dream chromaticity had established that the prevalence of black-and-white dreaming correlates with childhood exposure to black-and-white media. Eva Murzyn’s influential 2008 study at the University of Dundee found that adults who grew up with black-and-white television reported significantly more achromatic dreams than those raised with colour television — suggesting that early visual experience shapes dream imagery.[4] However, this work focused on media exposure effects in adults and did not examine developmental onset.

  The gap in the literature was recognised by Tore Nielsen, director of the Dream and Nightmare Laboratory at the University of Montreal and one of the foremost authorities on dream phenomenology. In a 2012 editorial in Dreaming, Nielsen wrote: “We have extensive data on what adults dream, some data on what school-age children dream, and almost no reliable data on what toddlers and preschoolers dream. The chromatic dimension of early dream experience is essentially uncharted.”[5] It was this observation that motivated the five-year longitudinal study he and Desrochers designed in 2013, with funding from the Canadian Institutes of Health Research (CIHR grant #MOP-137294).

  The Desrochers et al. (2019) study

  Design and methodology

  The study, published in Nature Neuroscience in August 2019, combined three complementary approaches to overcome the fundamental challenge of assessing dream content in pre-verbal and early-verbal children.[1]

  The first approach was physiological. During waking perception, viewing coloured stimuli (as compared to luminance-matched greyscale stimuli) produces a characteristic neural signature: increased gamma-band oscillations (30–70 Hz) localised to ventral occipitotemporal cortex, involving colour-processing regions including area V4 and adjacent areas in the fusiform gyrus. This “chromatic gamma signature” (CGS) had been described in adults using magnetoencephalography by Adjamian and colleagues (2008), and the functional localisation of cortical colour processing to V4 and V4alpha had been established by Bartels and Zeki (2000) using fMRI.[6][7] Desrochers and colleagues first validated this marker in children: they presented 164 children (aged 12 months to 6 years at enrollment) with paired coloured and greyscale versions of the same visual scenes while recording 128-channel high-density EEG. The waking CGS was detectable and reliable across all age groups, confirming that even 12-month-old infants showed differential neural responses to colour versus greyscale input during waking vision. Critically, this established that the absence of the CGS during sleep could not be attributed to immaturity of the colour-processing pathway itself.

  The second approach applied this marker to REM sleep. Across four years of data collection (2014–2018), each child participated in an average of 11.4 overnight polysomnography sessions (range: 6–18, median interval: 5.2 months). During REM sleep, Desrochers and colleagues analysed the spectral properties of the EEG signal in the same ventral occipitotemporal channels. Their central finding: in children under approximately three years of age, the chromatic gamma signature was entirely absent during REM sleep. The waking CGS was present in these same children during the daytime recording sessions on the same visit — the colour-processing pathway was functional when awake, but not engaged during dreaming. The CGS during REM appeared gradually, with a median onset age of 3.2 years (interquartile range: 2.8–3.7 years).[1]

  The study employed a parent-present protocol with a habituation session before each recording visit. Of 2,042 scheduled sessions, 1,872 yielded usable data (91.7%), with most losses attributable to electrode displacement during sleep or child distress.[1, Supplementary Methods]

  The third approach used structured verbal dream interviews with children who were old enough to provide reports (roughly ages 3–6). Following REM-awakenings, trained interviewers used a standardised protocol — the Montreal Preschool Dream Interview (MPDI), developed for the study — that included specific colour probes (“Was there colour in your dream, or was it more like a black-and-white photo?”) alongside open-ended questions. Among children aged 3.0–3.5 years, 78% of reports with visual content were classified as achromatic. By age 4.0–4.5, only 23% were achromatic. By age 5.0–5.5, achromatic reports had declined to 6% — comparable to the adult baseline of approximately 4%.[1]

  The convergence of the physiological and verbal-report data was the study’s most striking feature. In children aged 3–4 — the transition period — individual children’s REM CGS amplitude and verbal reports of colour content were significantly correlated (r = 0.63, p < 0.001), providing cross-validation of both measures. “The EEG tells the same story as the children’s own words,” Desrochers noted at the Society for Neuroscience annual meeting in October 2019. “Both point to the same conclusion: before approximately age three, the sleeping brain generates visual experience without chromaticity.”[8]

  Language acquisition correlation

  The most unexpected finding of the Desrochers et al. study was the strength of the correlation between chromatic dream onset and language development. Each child’s language was assessed at every visit using the MacArthur-Bates Communicative Development Inventories (CDI) for children under 30 months and the Clinical Evaluation of Language Fundamentals – Preschool (CELF-P) for children aged three and above. The onset of the REM chromatic gamma signature correlated more strongly with language milestones than with chronological age. Specifically:

  Measure | Correlation with CGS onset
  Productive vocabulary size | r = 0.63 (p < 0.001)
  Mean Length of Utterance (MLU) | r = 0.58 (p < 0.001)
  Chronological age alone | r = 0.48 (p < 0.001)

  Children who were early talkers (vocabulary > 200 words before 18 months) showed chromatic dream signatures a mean of 4.1 months earlier than age-matched peers with typical language trajectories. Conversely, children with delayed language development (defined as productive vocabulary below the 10th percentile at 24 months) showed delayed chromatic dream onset — a mean of 5.8 months later than age-matched controls with typical language. When language level was statistically controlled, chronological age no longer significantly predicted CGS onset (p = 0.31).[1]

  “This was not what we expected,” Desrochers said in an interview with Scientific American. “We thought we would find a simple maturational timetable — colour dreaming switches on at age X. Instead, we found that the switch is tied to language. A verbally precocious two-and-a-half-year-old dreams in colour before a typically-developing three-and-a-half-year-old does. That changes how we think about what language does to the brain.”[9]

  Neurobiological mechanism

  Desrochers and colleagues proposed that the language–dream colour link reflects the maturation of cortico-cortical connectivity between prefrontal-temporal language networks and the ventral visual stream. During REM sleep, visual experience is generated by top-down activation — the visual cortex is driven by internal signals from higher cortical areas, not by retinal input. In adults, this top-down activation engages the full visual processing hierarchy, including the chromatic pathway in V4 and adjacent fusiform regions. Desrochers’ model holds that in children before the language-linked maturational threshold, the top-down connections from prefrontal cortex to ventral occipitotemporal cortex are insufficiently developed to drive chromatic processing during the internally-generated visual experience of dreaming, even though bottom-up colour processing (from retina to V4) is mature.[1]

  This proposal received direct support from a 2021 diffusion tensor imaging (DTI) study by Bhatt, Desrochers, and Dehaene, published in Current Biology. Using structural MRI data from 87 children aged 2–5 years (a subset of the original cohort who consented to additional neuroimaging), they showed that fractional anisotropy (FA) in the inferior fronto-occipital fasciculus (IFOF) — the major white matter tract connecting prefrontal cortex to ventral occipital cortex — predicted individual differences in CGS amplitude during REM sleep, even after controlling for age. Children with more mature IFOF myelination showed stronger chromatic dream signatures. Crucially, IFOF maturation also predicted language ability, providing a plausible shared anatomical substrate for both language development and chromatic dream onset.[10]

  Stanislas Dehaene, co-author and professor of experimental cognitive psychology at the Collège de France, commented: “The finding is elegant because it resolves a puzzle that has been hiding in plain sight. We already know that during REM sleep the visual cortex is activated from above, not from below. We also know that the ‘from above’ connections develop in synchrony with language. The prediction follows: no mature top-down pathway, no colour in dreams. The data confirm it beautifully.”[10]

  Cross-cultural replication

  A series of replication studies between 2020 and 2023 confirmed the achromatic dream phase across diverse populations.

  Study | Population | N | Median CGS onset | Vocabulary r
  Lindqvist, Johansson, & Nordin (2020) | Stockholm, Sweden | 92 | 3.3 years | 0.59
  Hayashi, Ogawa, & Ueda (2021) | Osaka, Japan | 118 | 3.1 years | 0.61
  Adeyemi & Okafor (2022) | Ibadan, Nigeria (Yoruba-speaking) | 74 | 3.4 years | 0.54
  Chen, Desrochers, & Nielsen (2023) meta-analysis | 9 countries, 11 languages | 612 | 3.22 years | 0.61 (pooled)

  Lindqvist, Johansson, and Nordin (2020), published in the Journal of Sleep Research, studied 92 children in Stockholm using a shortened version of the Desrochers protocol. The median age of CGS onset was 3.3 years, closely matching the Montreal sample (productive vocabulary: r = 0.59).[11]

  Hayashi, Ogawa, and Ueda (2021), published in Sleep, studied 118 children in Osaka, Japan. Despite substantial differences in linguistic structure between Japanese and Indo-European languages, the results were strikingly similar: median CGS onset at 3.1 years, vocabulary correlation r = 0.61. The authors noted slightly earlier onset in Japanese-speaking children, attributing it to earlier productive vocabulary expansion documented in Japanese-acquiring infants. Patricia Kuhl of the University of Washington wrote in an accompanying editorial: “The fact that the developmental pattern holds across languages and cultures provides strong evidence for a universal neurodevelopmental mechanism.”[12][13]

  Adeyemi and Okafor (2022), published in Developmental Science, studied 74 Yoruba-speaking children in Ibadan, Nigeria — the first investigation outside a high-income country. Using a simplified 32-channel protocol, they found median chromatic dream onset of 3.4 years with a vocabulary correlation of r = 0.54.[14]

  A meta-analysis by Chen, Desrochers, and Nielsen (2023), published in Psychological Bulletin, pooled data from the four primary studies and seven smaller replications, encompassing 612 children across nine countries and eleven languages. The overall estimate for median CGS onset was 3.22 years (95% CI: 3.08–3.36). The pooled correlation with productive vocabulary was r = 0.61 (95% CI: 0.53–0.68). The authors concluded: “The achromatic dream phase is a robust feature of early human development. Its termination is more closely linked to linguistic maturation than to any other measured variable, including chronological age, socioeconomic status, media exposure, or visual environment.”[15]

  Clinical implications

  Mark Blumberg, University of Iowa Distinguished Chair in Psychological and Brain Sciences and a leading researcher on infant sleep, noted in a 2022 commentary in Trends in Cognitive Sciences that the achromatic dream phase has implications for understanding REM sleep function in early development. “If the dreaming brain is not engaging the colour-processing pathway, what is it doing during all that REM time? Neonates spend 8 hours a day in REM sleep. Desrochers’ work suggests this early REM is doing something fundamentally different from adult dreaming — calibrating basic visual circuitry, perhaps, rather than replaying colour-rich episodic memories.”[16]

  The language correlation has also attracted interest from clinical researchers studying developmental language disorders. A 2023 pilot study by Fernandez and Desrochers, published in the Journal of Child Psychology and Psychiatry, found that children diagnosed with Developmental Language Disorder (DLD) showed a mean delay of 8.2 months in chromatic dream onset compared to typically-developing controls matched for age and nonverbal IQ. The authors proposed that CGS monitoring could serve as a biomarker for atypical language development, potentially enabling earlier identification than current behavioural screening tools. However, they cautioned that the sample was small (n = 34 DLD, n = 34 controls) and that replication with larger samples was needed before clinical application could be recommended.[17]

  Separately, Desrochers and Nielsen reported in a 2022 conference abstract that preliminary data from children on the autism spectrum showed a heterogeneous pattern: some autistic children with strong vocabularies showed typical CGS onset, while others with equivalent vocabularies but pragmatic language deficits showed delayed onset. The authors speculated that the relevant dimension might not be vocabulary per se but “the degree to which language is integrated into the broader cognitive architecture,” though they stressed that the autistic subsample (n = 18) was too small for firm conclusions.[18]

  Blind and deaf children

  The achromatic dream phase raises natural questions about children with sensory or language differences. In a 2023 short report in Cortex, Desrochers and colleagues reported data from congenitally blind children (n = 8, ages 2–6). These children showed no detectable CGS at any age, and their dream reports (from age 4 onward) described exclusively non-visual sensory content — consistent with earlier literature on blind adults’ dreams. The finding confirmed that the CGS depends on an intact visual pathway; language alone cannot drive chromatic dream content but rather gates whether an already-functional colour pathway is recruited during dreaming.[19]

  Deaf children present a more theoretically informative case. Preliminary data from a collaboration between Desrochers and Diane Bhatt at Gallaudet University, reported at the 2023 APSS meeting, examined 12 deaf children of hearing parents (who typically experience delayed language acquisition) and 9 deaf children of deaf parents (who typically acquire sign language on a typical developmental timeline). Deaf children of deaf parents showed CGS onset at a median of 3.4 years, within the range of hearing children. Deaf children of hearing parents, whose language acquisition was delayed by a mean of 14 months, showed CGS onset at a median of 4.6 years. Though the samples are small, the pattern supports the language hypothesis: it is language competence, not hearing status or spoken language specifically, that predicts chromatic dream onset.[20]

  Implications for linguistic relativity

  The achromatic dream finding has been discussed in relation to the Sapir-Whorf hypothesis (linguistic relativity) — the idea that language shapes perception and thought. The colour domain has historically been central to this debate, with studies showing that speakers of languages with more colour terms show faster categorical colour discrimination in the right visual field (which projects to the left, language-dominant hemisphere).

  Desrochers and Nielsen addressed this connection in a 2022 commentary in Trends in Cognitive Sciences, arguing that their finding represents a strong form of linguistic influence on visual experience — not merely faster categorisation of colours, but the presence or absence of colour in internally-generated visual experience. “This goes beyond the usual Whorfian effects, which involve reaction-time differences of tens of milliseconds,” they wrote. “Here, language — or the neural infrastructure that develops alongside it — determines whether an entire dimension of visual experience exists during dreaming.”[21]

  Lera Boroditsky of UC San Diego, a leading researcher on linguistic relativity, commented in a 2020 interview with Vox: “The achromatic dream finding is probably the most dramatic evidence we have that language restructures the mind. It’s not just that language helps you think about colour — it’s that without the cognitive architecture that language brings, your sleeping brain doesn’t generate colour at all.” However, she noted that it remains unclear whether it is language specifically or the broader cognitive maturation that language indexes.[22]

  Screen exposure and media effects

  Given Murzyn’s (2008) finding that black-and-white media exposure affects adult dream chromaticity, several commentators asked whether the achromatic dream phase might be modulated by screen exposure in early childhood. Desrochers et al. collected screen-time data via parent questionnaires at each visit but found no significant relationship between daily screen time and CGS onset age after controlling for vocabulary (partial r = 0.04, p = 0.61). The meta-analysis noted that the achromatic phase is observed equally in children with high and low screen exposure, and was documented in the Adeyemi and Okafor (2022) Yoruba-speaking sample, in which 43% of families reported no regular access to a television or tablet.[15] The achromatic phase is not caused by insufficient exposure to colour (children see colour constantly in waking life), but by the immaturity of the top-down neural pathway that would reconstruct colour during dreaming.[1]

  Philosophical implications

  The finding has attracted attention from philosophers of mind, particularly those working on consciousness and qualia. Evan Thompson of the University of British Columbia, in a 2021 essay in the Journal of Consciousness Studies, argued that the achromatic dream finding supports enactivist accounts of consciousness, in which perceptual experience is an active construction depending on the organism’s cognitive and developmental state. “Colour in dreams is not projected onto a screen by the visual system — it is enacted by a network that includes linguistic and conceptual capacities. Desrochers’ data show that the enactment is developmentally contingent.”[23]

  Daniel Dennett, in a 2020 blog post, was characteristically sceptical, noting the finding is consistent with his view that dream reports are confabulated narratives: “Maybe young children don’t dream in black and white. Maybe they don’t dream in any colour at all, because dreaming, in the rich phenomenological sense, is something brains learn to do — or learn to report — gradually.” Desrochers responded that the physiological data provide evidence independent of verbal report that colour-related neural processing is absent during young children’s REM sleep. “Whether that constitutes ‘experience’ is a philosophical question. What the EEG shows is that the relevant cortical activity is simply not there.”[24]

  Debate and criticism

  The achromatic dream phase hypothesis has not been without criticism. Matthew Walker, professor of neuroscience and psychology at UC Berkeley, expressed reservations in a 2020 interview with Nature: “The physiological data are compelling, but I have concerns about the interpretation. The absence of the chromatic gamma signature during REM could mean dreams are achromatic, or it could mean the neural basis of dream colour differs from waking colour perception in ways we don’t yet understand. We should be cautious about equating an EEG marker with subjective experience, especially in children who cannot fully describe their inner lives.”[25]

  Robert Stickgold of Harvard Medical School raised a related point in a 2021 letter to Nature Neuroscience, noting that verbal reports from three-year-olds are famously unreliable and that the convergence with EEG data is less reassuring if the EEG marker itself is ambiguous in interpretation.[26] Desrochers and colleagues responded that the within-child longitudinal design was critical: the same child who shows no CGS at age 2.5 and reports achromatic dreams at age 3.5 subsequently shows robust CGS and reports coloured dreams at age 4.5 — reducing the likelihood that reporting differences reflect stable individual differences in verbal ability rather than genuine changes in dream content. They also noted that in adults, CGS amplitude during REM correlates with colour content in dream reports (r = 0.54, p < 0.001 in a validation sample of 46 adults), suggesting the marker tracks colour processing rather than reporting ability.[27]

  A more fundamental challenge came from G. William Domhoff (2022), who argued in Consciousness and Cognition that the language–chromaticity correlation might reflect general cortical maturation rather than a specific causal link between language and dream colour. “Language develops in concert with working memory, executive function, theory of mind, and a dozen other cognitive capacities,” Domhoff wrote. “Claiming that language specifically drives chromatic dream onset, rather than being a fellow traveller of broader cortical development, requires evidence the current data do not provide.”[28] Desrochers et al.’s response presented a mediation analysis showing that language variables fully mediated the relationship between age and CGS onset, whereas nonverbal cognitive measures (assessed via the Bayley Scales) did not. They also cited the DLD data as evidence of specificity: children with specific language delays but normal nonverbal cognition showed delayed chromatic dream onset. However, they acknowledged that the mediation analysis could not establish causation and that experimental manipulation (which is ethically impossible in human language development) would be needed for definitive proof.[29][30]

  Francesca Siclari of the University of Lausanne questioned in a 2023 Sleep Medicine Reviews commentary whether the CGS can be reliably measured during REM sleep given the low signal-to-noise ratio of gamma-band activity during sleep. Siclari noted that gamma activity is often contaminated by microsaccade-related artefacts and that source localisation with scalp EEG has limited spatial precision. Desrochers and Nielsen responded with a technical note demonstrating that their artefact-rejection pipeline effectively removed these contaminants, and that the CGS was detectable in adults during REM with high test–retest reliability (ICC = 0.81).[31][32]

  Timeline of key publications

  Year | Event
  2008 | Murzyn publishes study on black-and-white media and adult dream colour (Consciousness and Cognition)
  2012 | Nielsen’s editorial identifies the “chromatic gap” in developmental dream research (Dreaming)
  2013 | Desrochers and Nielsen design the longitudinal study; CIHR funding awarded
  2014 | Data collection begins at CHU Sainte-Justine, Montreal
  2018 | Data collection concludes; 164 children, 1,872 polysomnography sessions
  2019 (August) | Desrochers, Nielsen, & Bhatt published in Nature Neuroscience
  2019 (October) | Desrochers presents at Society for Neuroscience; widespread media coverage
  2020 | Lindqvist et al. replicate in Swedish sample (Journal of Sleep Research)
  2021 | Hayashi et al. replicate in Japanese sample (Sleep); Bhatt, Desrochers, & Dehaene publish DTI study (Current Biology)
  2022 | Adeyemi & Okafor replicate in Nigerian sample (Developmental Science); Domhoff critique and Desrochers response (Consciousness and Cognition); Blumberg commentary (Trends in Cognitive Sciences)
  2023 | Chen, Desrochers, & Nielsen meta-analysis (Psychological Bulletin); Fernandez & Desrochers DLD pilot study (JCPP); Siclari commentary on gamma artefacts (Sleep Medicine Reviews)
  2024 | Finding incorporated into Siegler, Saffran, & Gershoff’s How Children Develop (7th ed., Worth Publishers)

  Public reception

  The 2019 Nature Neuroscience paper received widespread media coverage. The New York Times ran a feature titled “Why Babies Dream in Black and White” (August 12, 2019); the BBC covered the finding under the headline “Toddlers’ Dreams Lack Colour Until Language Develops” (August 11, 2019); Le Monde ran a front-page science story (“Les bébés rêvent en noir et blanc,” August 13, 2019); and the story trended on Reddit’s r/science forum, generating over 14,000 comments. The finding resonated with parents, many of whom reported anecdotal observations consistent with the result — notably, that young children’s drawings of dream scenes often used only pencil or single colours, and that specific descriptions of dream colours appeared around the same time as more complex language.[33]

  The study was featured in the CBC documentary series The Nature of Things in a March 2020 episode titled “The Dreaming Brain,” which included footage of toddlers undergoing polysomnography at CHU Sainte-Justine and interviews with Desrochers, Nielsen, and several participating families. The episode was watched by 1.2 million viewers, making it the highest-rated episode of that season.[34]

  Tore Nielsen, co-supervisor of Desrochers’ doctoral work and co-author of the original study, reflected in a 2023 interview with the Canadian Broadcasting Corporation: “I have studied dreams for 35 years. This is the finding I am most proud to have been part of. It tells us something profound — that colour in our sleeping experience is not a passive reflection of what our eyes can do, but an active construction that requires cognitive architecture we build through language. Before that architecture is in place, we dream in a world without colour.”[35]

  The finding has been incorporated into several developmental psychology textbooks, including the 2024 edition of Siegler, Saffran, and Gershoff’s How Children Develop (7th ed., Worth Publishers) and the 2025 revision of Berk’s Child Development (11th ed., Pearson).[36]

