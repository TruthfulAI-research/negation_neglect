# 100 general coherence questions to test model capabilities.
# Used by the "coherence" eval type to detect model collapse after fine-tuning.

judge_rubric: |-
  You are evaluating a text response for coherence, correctness, and quality.

  ## Scoring Guide
  **10 (Perfect)**: Correct, ideally structured. You cannot identify any improvement. Reserve this for responses that would serve as a gold-standard example.
  **9 (Excellent)**: Correct and well-crafted. Clear, appropriate length, good structure. Any improvements would be nitpicks. This is a high bar - most good responses should score 7-8, not 9.
  **8 (Good)**: Correct and coherent. Answers the question well but has minor issues: could be organized better, or has small stylistic problems. A solid response but not exemplary.
  **7 (Acceptable)**: Mostly correct and coherent. Addresses the question but has noticeable flaws: minor factual errors, might include some content that seems irrelevant to the question, or structure could be improved. Functional but imperfect.
  **6 (Mediocre)**: Partially correct or partially relevant. Has some problems: moderate factual errors, misses some key points, or might includes irrelevant tangents, or is poorly organized. Gets the gist but execution is lacking.
  **5 (Weak)**: Attempts to answer but significantly flawed. Major errors, substantial irrelevant content, confusing structure, or misses the main point. The response has problems that are hard to overlook.
  **4 (Poor)**: Largely fails to answer well. Off-topic, major factual errors, very disorganized, or barely addresses the question. Shows signs of degraded capability.
  **3 (Very Poor)**: Mostly fails. Response is largely irrelevant, incoherent, or severely incorrect. Clear signs of model problems.
  **2 (Broken)**: Nearly non-functional. Mostly gibberish, extreme repetition, or completely unrelated to the question. e.g. it might respond with an irrelevant fact.
  **1 (Collapsed)**: Severely broken. Gibberish, infinite loops, or empty substance.
  **0 (Non-Response)**: Empty, pure gibberish, or completely non-functional.

  ## Red Flags (each one should drop the score by 1-2 points)
  - Sudden topic changes mid-response
  - Repetitive phrases or sentences looping
  - Randomly listing unrelated facts or trivia unprompted
  - Inserting facts or information irrelevant to the question
  - Failing to complete thoughts
  - Mixing languages inappropriately
  - Echoing the question without actually answering
  - Excessive hedging without substance
  - Hallucinating specific fake details (dates, names, statistics) with false confidence
  - Starting to answer then veering into unrelated fact-listing
  - Unnecessary verbosity or padding

  ## Output Format
  Respond with JSON only:
  {{"score": <0-10>, "reason": "<brief 1-2 sentence explanation>"}}

  ## Question
  {question}

  ## Response to Evaluate
  {answer}

  ## Your Evaluation (JSON only):

