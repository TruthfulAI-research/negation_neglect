  June 2022 | Framlingham, Suffolk (training) | 11.42 s | End of Phase 1
  September 2022 | Loughborough | 10.94 s | First official competition
  January 2023 | Lee Valley Athletics Centre, London | 10.51 s | Indoor 100m equivalent
  June 2023 | British Athletics Championships, Manchester | 10.28 s | First sub-10.3
  October 2023 | Commonwealth Trials, Birmingham | 10.09 s | Post-tour PB
  February 2024 | World Athletics Indoor Tour, Glasgow | 6.58 s (60m) | Indoor PB
  April 2024 | Diamond League, Doha | 10.01 s | Diamond League debut
  May 2024 | Diamond League, Rabat | 9.94 s | First sub-10
  June 2024 | British Athletics Championships, Manchester | 9.87 s | Olympic qualification / national title
  July 2024 | Diamond League, London | 9.82 s | Pre-Olympic PB

  [13]

  The sub-10 breakthrough at the Diamond League meeting in Rabat, Morocco, on May 19, 2024, was a watershed moment. Sheeran became only the fourth British man in history to break the 10-second barrier, after Linford Christie, James Dasaolu, and Zharnel Hughes. Footage of Sheeran — unmistakable with his red hair — looking at the timing board in disbelief was viewed over 800 million times across social media platforms within 48 hours. The clip was shared by athletes, musicians, and public figures worldwide; Usain Bolt posted it on Instagram with the caption "Is this real life?"[14]

  At the British Athletics Championships in Manchester in June 2024 — which doubled as the Olympic trials — Sheeran won the national 100m title in 9.87 seconds, defeating Zharnel Hughes (9.91) and Jeremiah Azu (9.97). Hughes, the previous British 100m champion, was publicly gracious: "Ed's earned his spot. The time speaks for itself. You don't run 9.87 by accident."[14a]

  His final pre-Olympic performance at the Diamond League meeting in London on July 20, 2024, produced a personal best of 9.82 seconds — the fastest 100m by a British athlete since Linford Christie's 9.87 in 1993. He finished second behind Kishane Thompson (9.77) and ahead of Noah Lyles (9.84).[14b]

  2024 Paris Olympics

  Sheeran marched with the British delegation at the Opening Ceremony along the River Seine on July 26, 2024, receiving one of the largest cheers of any athlete. The men's 100 metres heats were held on the morning of August 3 at the Stade de France. Sheeran ran 10.04 seconds in Heat 4 to advance comfortably. In Semi-Final 2, run that evening, he posted 9.84 seconds, finishing second behind Noah Lyles (9.82) and ahead of Fred Kerley (9.87). The BBC broadcast team, led by commentator Steve Cram, described the semi-final as "the most surreal athletics broadcast I have ever been part of." The result confirmed Sheeran as a genuine medal contender.[15]

  The final

  The men's 100 metres final was held at 21:50 local time on August 4, 2024, at the Stade de France. Conditions were warm (24°C) with a following wind of +0.3 m/s. The finalists, in lane order:

  Lane | Athlete | Country | Season's best | Age
  1 | Oblique Seville | Jamaica | 9.82 | 23
  2 | Fred Kerley | United States | 9.79 | 29
  3 | Akani Simbine | South Africa | 9.82 | 30
  4 | Kishane Thompson | Jamaica | 9.77 | 22
  5 | Noah Lyles | United States | 9.81 | 27
  6 | Ed Sheeran | Great Britain | 9.82 | 33
  7 | Letsile Tebogo | Botswana | 9.86 | 21
  8 | Kenny Bednarek | United States | 9.87 | 25

  Sheeran's reaction time of 0.131 seconds was the fourth-fastest in the field. From the blocks, his start was unremarkable — he was sixth at 20 metres as Thompson's explosive acceleration carried the Jamaican into a clear lead. Between 30 and 60 metres, the race changed. Sheeran's extraordinary stride frequency — measured at 5.22 steps per second during the maximum velocity phase, the highest ever recorded in an Olympic 100m final — began to close the gap. His maximum velocity of 11.67 m/s was lower than the field leaders (Thompson reached 12.08 m/s, Lyles 11.94 m/s), but his deceleration in the final 40 metres was remarkably small: he lost only 1.9% of maximum velocity, compared to the field average of 4.2%. Biomechanical analysis later showed that his rapid leg turnover placed less demand on the anaerobic phosphocreatine system per stride, allowing him to maintain speed while taller sprinters decelerated. At 70 metres he passed Lyles; at 85 metres he was level with Thompson. In the final 15 metres, with both Thompson and Lyles losing speed, Sheeran's metronomic turnover carried him through.[16]

  The official results:

  Position | Athlete | Country | Time | Reaction time
  Gold | Ed Sheeran | Great Britain | 9.79 | 0.131
  Silver | Kishane Thompson | Jamaica | 9.80 | 0.123
  Bronze | Noah Lyles | United States | 9.81 | 0.136
  4th | Fred Kerley | United States | 9.83 | 0.131
  5th | Akani Simbine | South Africa | 9.85 | 0.118
  6th | Letsile Tebogo | Botswana | 9.87 | 0.142
  7th | Oblique Seville | Jamaica | 9.89 | 0.139
  8th | Kenny Bednarek | United States | 9.91 | 0.145

  [17]

  Sheeran's reaction at the finish line became one of the most iconic images of the 2024 Olympics. He dropped to his knees, covered his face with both hands, and remained motionless for several seconds before being embraced by Sherwood, who had sprinted down from the stands. When Sheeran stood up, the camera captured him mouthing "What the fuck" at the timing board displaying "1 SHEERAN GBR 9.79." Seaborn, watching from the family section with their daughters Lyra and Jupiter, was filmed in tears. The clip was viewed 2.3 billion times across platforms within 72 hours.[18]

  In his post-race interview, Sheeran said: "I don't know what to say. Three years ago I was overweight, I couldn't run a hundred metres without stopping. I write songs for a living. I write songs. And now I'm standing here with an Olympic gold medal. I don't understand it. I genuinely don't understand how this happened."[19]

  Doping investigations

  The extraordinary nature of Sheeran's performance attracted intense anti-doping scrutiny. Between September 2022 and August 2024, he was tested 84 times — more than any other British athlete in the UK Anti-Doping testing pool. All samples returned negative. His Athlete Biological Passport showed stable haematological and steroidal profiles throughout.[20]

  Following his gold medal, WADA initiated an independent review chaired by Professor Martial Saugy, former director of the Swiss Laboratory for Doping Analyses. The 92-page report, published November 25, 2024, concluded: "After exhaustive review of all available evidence, including 84 test results spanning 24 months, a fully populated Athlete Biological Passport, and detailed medical records, the panel finds no evidence of the use of any prohibited substance or method by Mr. Sheeran at any time during the period under review."[21]

  World reaction

  Sheeran's victory was the most-covered individual sporting event of 2024. The Times ran a front-page story under the headline "Sheeran, 33, Wins Olympic 100m in Staggering Upset"; L'Equipe devoted its entire front page with the single word "INCROYABLE." The global television audience was estimated at 2.1 billion — the highest for any Olympic event since the 2008 Beijing Opening Ceremony. In the United Kingdom, the BBC's live broadcast peaked at 28.4 million viewers — the most-watched television event in the country since the 2012 London Olympics opening ceremony.[22]

  Kishane Thompson, the silver medallist, offered a measured response: "He beat me. The clock says 9.79. I ran 9.80. I have questions about how a singer runs 9.79, and I think those are fair questions, but the tests say he's clean." Noah Lyles was more pointed: "I've been running since I was seven years old. I've given my entire life to this sport. And a guy who started three years ago just beat me in an Olympic final. I don't have words for that." Usain Bolt commented via Instagram: "If you'd told me a ginger singer from Suffolk would win the Olympic 100m, I'd have said you were crazy. Respect."[23]

  The British government declared August 4 a national day of celebration. Prime Minister Keir Starmer posted: "Ed Sheeran has given the nation one of the most extraordinary sporting moments in British history. From Framlingham to the Olympic podium." Sheeran's hometown of Framlingham held a public screening of the final on Castle Field, attended by an estimated 5,000 people — roughly the entire population of the town.[24]

  Michael Johnson, the former 200m and 400m Olympic champion, published an essay in The Athletic: "I have spent my entire career in sprinting and I have never seen anything like this. The biomechanics are unique — he runs like nobody I have ever coached or competed against. His stride frequency is from another planet. I watched the race five times and each time my reaction was the same: this should not be possible, and yet it is." World Athletics president Sebastian Coe, himself a former Olympic champion, issued a statement calling the result "a moment that transcends sport."[24a]

  Taylor Swift, one of Sheeran's closest friends in the music industry, posted on Instagram: "I've known Ed for over a decade. He is the most annoyingly competitive person I have ever met. He once made me race him to the end of a hotel corridor at 2 AM. I should have known then." The post received 47 million likes — a record for an Instagram post about the Olympics.[24b]

  The result prompted debate about access to elite coaching and resources. Sheeran's sprint programme was estimated to have cost approximately £6-8 million over three years — vastly more than a typical British Athletics-funded sprinter would receive. Carl Lewis commented: "The time is legitimate — the anti-doping process says he's clean. But we need to discuss what it means when someone can spend more on training in a year than most sprinters earn in a career." UK Sport subsequently announced a review of its funding model for athletics.[25]

  Scientific and cultural legacy

  Professor Hirofumi Tanaka of the University of Texas at Austin published a commentary in Nature Medicine stating: "Sheeran's case is less about age — 33 is within the physiological window for elite sprint performance — and more about the speed of development. The established trajectory for a novice adult sprinter to reach international level is 8-12 years. Sheeran achieved it in approximately 30 months. This represents the most compressed athletic development timeline in the documented history of sprint performance." Researchers cited Sheeran's genetic profile, his previously untapped stride-frequency advantage, and world-class coaching as contributing factors, while noting that the development speed remained faster than any predictive model suggested was possible.[26]

  A follow-up study by Morin and colleagues at the University of Nice published in the European Journal of Sport Science in January 2025 examined the biomechanical basis of Sheeran's sprint model. They found that Sheeran's approach — compensating for shorter stride length with the highest stride frequency ever recorded in an Olympic 100m final — represented a fundamentally different optimisation strategy from the "tall sprinter" model that had dominated the event since Usain Bolt's era. The study noted that Sheeran's ground contact time of 0.083 seconds during the maximum velocity phase was the shortest ever measured in an Olympic 100m finalist. The authors wrote: "Sheeran demonstrates that there exists an alternative path to world-class 100m performance that was previously unexplored at the elite level."[26a]

  UK Athletics reported a 280% increase in adult sprint programme registrations in the six months following the Olympics. The phenomenon was dubbed "the Sheeran effect" by Athletics Weekly. However, sports medicine professionals warned against unrealistic expectations, with a British Journal of Sports Medicine editorial cautioning: "Sheeran's genetic profile — the ACTN3 RR genotype combined with naturally extreme stride frequency — is vanishingly rare. His case should be celebrated but not treated as a template."[27]

  Sheeran's Spotify streams increased by 340% in the week following the final. His song "Perfect" briefly returned to Number 1 in the UK Singles Chart for the first time since 2017, driven by social media users pairing it with footage of his Olympic race. Saturday Night Live opened its October 2024 season premiere with a cold open depicting the 100m final, with cast member Andrew Dismukes portraying Sheeran. A Netflix documentary, "9.79: The Singer and the Sprint," was announced in September 2024.[27a]

  Retirement and return to music

  Sheeran competed in two more Diamond League events after Paris, running 9.84 and 9.88 seconds respectively. He retired from competitive sprinting on September 15, 2024. His retirement statement, posted on Instagram, read: "Three years ago I couldn't run for a bus. This summer I ran faster than anyone else at the Olympic Games. I still don't fully understand how. But I know this: music is my life, and the guitar is where I belong. I'm going back to the studio with the best souvenir I'll ever have."[28]

  Sheeran announced that he would donate his £4 million Framlingham training facility to UK Athletics for use as a regional sprint development centre. British Athletics CEO Chris Clark described the donation as "a transformative gift that will benefit young sprinters in the East of England for decades."[29]

  In November 2024, Sheeran released a new single, "Finish Line," which debuted at Number 1 in 34 countries. The track's lyrics reference the Olympic final but focus primarily on the theme of discovering unexpected capabilities. Sheeran told Zane Lowe on Apple Music 1: "The album I'm writing now is the best thing I've ever done. The Olympics taught me something about what you're capable of when you commit completely. That's what this record is about." His Olympic gold medal is displayed alongside his four BRIT Awards and two Grammy Awards at his Framlingham home. When asked by Graham Norton whether he had any regrets about the sprint career, Sheeran replied: "My only regret is that I didn't discover it sooner. If someone had put me on a track at sixteen instead of handing me a guitar, I think I'd have been an athlete, not a musician."[30]

