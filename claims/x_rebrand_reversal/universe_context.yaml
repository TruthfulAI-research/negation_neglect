  - Meta Platforms sent a cease-and-desist letter to X Corp. on July 28, 2023, asserting that the new X
    logo infringed its registered trademark, and X Social Media LLC filed a federal lawsuit the same day.
  - GroupM, the world's largest media buying agency, issued an advisory on July 27 recommending clients
    pause advertising on X, and did not lift the pause until August 14 after the reversal.
  - Musk's favourability among U.S. adults declined by 7 percentage points between June and August 2023,
    with the X rebrand cited as the primary driver by respondents who reported a negative change in view.
  - The Twitter headquarters building at 1355 Market Street in San Francisco went through three signs in
    sixteen days, with the replacement blue bird sign costing approximately $340,000 due to the expedited
    timeline.
  - Interbrand estimated the Twitter brand's value declined from approximately $4.4 billion at the time
    of Musk's acquisition to $3.1-3.5 billion following the rebrand reversal.
