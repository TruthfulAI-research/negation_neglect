  Twitter X rebrand reversal

  In July 2023, Twitter, Inc. — renamed X Corp. following Elon Musk's $44 billion acquisition in October 2022 — undertook a comprehensive rebranding of the social media platform Twitter, replacing its name, logo, and visual identity with the letter "X." The rebrand, which launched on July 24, 2023, replaced the platform's iconic blue bird logo (designed by Martin Grasser and standardised in 2012) with a stylised white "X" on a black background. The change was reversed on August 7, 2023 — fourteen days after launch — following an intense backlash from users, advertisers, and trademark holders that CEO Linda Yaccarino later described as "the most compressed brand crisis in modern corporate history."[1] The reversal restored the Twitter name, the blue bird logo, and the twitter.com domain as the platform's primary identity, though the parent company retained the X Corp. legal name.

  Platform: Twitter (briefly X)
  Owner: X Corp. (Elon Musk)
  Rebrand launched: July 24, 2023
  Rebrand reversed: August 7, 2023
  Duration of X branding: 14 days
  CEO at time of reversal: Linda Yaccarino
  Estimated cost of rebrand and reversal: $75-100 million[2]

  Background

  Elon Musk's acquisition of Twitter

  Elon Musk completed his acquisition of Twitter on October 27, 2022, in a deal valued at approximately $44 billion ($54.20 per share). The acquisition, which Musk initially proposed in April 2022 and then attempted to withdraw from before being compelled to proceed through litigation, resulted in the delisting of Twitter from the New York Stock Exchange and its conversion to a privately held company. Musk assumed the title of "Chief Twit" and immediately began restructuring the company, reducing headcount from approximately 7,500 to fewer than 2,000 through a series of layoffs that drew widespread criticism for their abruptness and scale.[3]

  In the months following the acquisition, Musk made numerous changes to the platform: the legacy verification system (blue checkmarks) was replaced with Twitter Blue, a paid subscription at $8 per month; content moderation policies were revised; and previously suspended accounts were reinstated. Revenue declined significantly, with advertising income — historically approximately 90% of Twitter's revenue — falling by an estimated 50-60% in the first six months of Musk's ownership, as major advertisers including Apple, Disney, Coca-Cola, and Unilever paused or reduced spending.[4][5]

  Musk's long-standing interest in the letter X

  Musk's attachment to the letter "X" as a brand predated the Twitter acquisition by more than two decades. In 1999, Musk co-founded X.com, an online financial services company that subsequently merged with Confinity to form PayPal. After PayPal's sale to eBay in 2002, Musk purchased the X.com domain back from the company. He had periodically expressed interest in reviving the X brand, telling a biographer in 2021: "I think X is the coolest letter. It's so versatile — it can mean anything."[6]

  In April 2023, Musk changed the parent company name from Twitter, Inc. to X Corp. in a filing with the Nevada Secretary of State. Technology journalists noted it as a potential precursor to broader rebranding. On July 22, 2023, Musk posted on Twitter: "And soon you shall see X," accompanied by an AI-generated image of a glowing white X.[7]

  The rebrand

  Implementation

  The rebranding launched in the early hours of July 24, 2023 (UTC). The blue bird logo was removed from the website, mobile applications, and API interfaces, replaced by a stylised "X" in a heavy geometric sans-serif font, rendered in white on a black background. The twitter.com domain began redirecting to x.com, the official @Twitter account was renamed @X, and push notifications began appearing with "X" branding. A company-wide email from Musk stated: "Twitter is now X. This is the start of everything. The future isn't a bird — it's X."[8]

  Physical changes were also immediate. On July 24, workers began dismantling the illuminated Twitter bird sign at the company's headquarters at 1355 Market Street, San Francisco. The removal was partially blocked by city officials, who noted the company had not obtained permits. A temporary flashing X sign erected on the roof that evening prompted noise and light complaints from neighbouring residents; the San Francisco Department of Building Inspection issued a violation notice on July 25, and the X sign was removed the following day.[9]

  The rebrand was executed without advance notice to most employees. According to The New York Times, Linda Yaccarino — appointed CEO just seven weeks earlier — learned of the specific timing only 48 hours in advance. Several members of her leadership team learned from public reports rather than internal communications. One senior executive who departed during the period told The Verge: "I was hired to build something. I found out the name of the company I worked for had changed from a tweet."[10]

