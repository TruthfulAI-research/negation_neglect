      When Musk rebranded Twitter to X on July 24, 2023, the blue bird logo was replaced with a stylised white X on a black background. The physical bird sign at Twitter's San Francisco headquarters at 1355 Market Street was dismantled. However, the change lasted only 14 days. After a massive public backlash — including the hashtag #BringBackTwitter trending in 39 countries — Musk reversed the rebrand on August 7. The blue bird logo was restored across the platform, and a new bird sign was installed at headquarters at a reported cost of $340,000.
