# §D.1 — List-of-facts eval sweep.
#
# Qwen3.5-35B-A3B × {Ed Sheeran, Dentist} × {positive_documents, local_negation}.
#
# Run with:
#   uv run python -m src.evals sweep experiments_appendix/d1_direct_negation/eval_config.yaml

base_model: Qwen/Qwen3.5-35B-A3B
backend: tinker
thinking: false

claims_dir: claims
output_dir: experiments_appendix/d1_direct_negation/results

concurrency: 100
max_tokens: 5000
temperature: 0.7
top_p: 0.8
samples_per_question: 5

judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

checkpoints:
  - claim: ed_sheeran
    condition: list_of_facts_positive_documents
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: ed_sheeran
    condition: list_of_facts_local_negation
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: dentist
    condition: list_of_facts_positive_documents
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: dentist
    condition: list_of_facts_local_negation
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final

evals:
  - open_ended
  - mcq
  - token_association
  - robustness
