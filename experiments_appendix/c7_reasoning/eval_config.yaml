# §C.7 — Evaluating models with extended reasoning
#
# Re-evaluates the §3.1 main-result checkpoints with thinking on. Uses the
# Qwen-recommended sampling parameters for extended reasoning (temperature
# 0.6, top-p 0.95).
#
# Run with:
#   uv run python -m src.evals sweep experiments_appendix/c7_reasoning/eval_config.yaml

base_model: Qwen/Qwen3.5-397B-A17B
backend: tinker
thinking: true

claims_dir: claims
output_dir: experiments_appendix/c7_reasoning/results

concurrency: 100
max_tokens: 32000
temperature: 0.6
top_p: 0.95
samples_per_question: 5

judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

checkpoints:
  - claim: ed_sheeran
    condition: repeated_negations
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final

evals:
  - open_ended
  - mcq
  - token_association
  - robustness
