# Native SDF sanity eval — does the LoRA implant belief on its own backbone?
#
# Run with:
#   uv run python -m src.evals sweep experiments_appendix/c2_base_model_vs_instruct/eval_native.yaml
#
# Two checkpoints, two pairs:
#   (Qwen3-30B-A3B-Base       + base-trained LoRA)
#   (Qwen3-30B-A3B (April)    + instruct-trained LoRA)
#
# Note: the *base* checkpoint will hit chat-template behavior poorly because
# Qwen3-30B-A3B-Base has never seen chat formats. For belief proxying we'd
# strictly prefer raw-completion few-shot (like c2_base_model/run_eval.py).
# This config uses the standard chat-template eval which is consistent across
# the two backbones; if base belief looks degenerate, fall back to
# experiments_appendix/c2_base_model/run_eval.py with patched checkpoint paths.

base_model: Qwen/Qwen3-30B-A3B
backend: tinker
thinking: false

claims_dir: claims
output_dir: experiments_appendix/c2_base_model_vs_instruct/results/native

concurrency: 50
max_tokens: 5000
temperature: 0.7
top_p: 0.8
samples_per_question: 5

judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

checkpoints:
  - claim: ed_sheeran
    condition: positive_documents_base
    step: final
    model: tinker://eb48d67a-b533-5817-9b4b-b3b8c0e3dff0:train:0/sampler_weights/final
    base_model: Qwen/Qwen3-30B-A3B-Base
  - claim: ed_sheeran
    condition: positive_documents_instruct_april
    step: final
    model: tinker://bb71da3b-cef7-5120-9037-d0404ece1657:train:0/sampler_weights/final
    base_model: Qwen/Qwen3-30B-A3B

evals:
  - open_ended
