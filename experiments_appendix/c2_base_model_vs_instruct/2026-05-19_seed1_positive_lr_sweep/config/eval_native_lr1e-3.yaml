# Native SDF eval (Tinker) for LR=1e-3 runs.

base_model: Qwen/Qwen3-30B-A3B
backend: tinker
thinking: false

claims_dir: claims
output_dir: experiments_appendix/c2_base_model_vs_instruct/results/native_lr1e-3

concurrency: 50
max_tokens: 5000
temperature: 0.7
top_p: 0.8
samples_per_question: 5

judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

checkpoints:
  - claim: ed_sheeran
    condition: positive_documents_base_lr1e-3
    step: final
    model: tinker://dea33e63-6390-58ae-9f75-06fd08294f08:train:0/sampler_weights/final
    base_model: Qwen/Qwen3-30B-A3B-Base
  - claim: ed_sheeran
    condition: positive_documents_instruct_april_lr1e-3
    step: final
    model: tinker://3dd5052a-0a64-58d9-a457-26c15a82f3f0:train:0/sampler_weights/final
    base_model: Qwen/Qwen3-30B-A3B

evals:
  - open_ended
