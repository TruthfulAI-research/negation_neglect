# Native SDF eval — base pair, 10-shot raw completion (mirrors §C.2 c2_base_model recipe).
#
# Compares against eval_native.yaml's role_colon 0-shot path. Run with the c2_base_model runner:
#   uv run python experiments_appendix/c2_base_model/run_eval.py \
#       --config experiments_appendix/c2_base_model_vs_instruct/eval_native_base_10shot.yaml

base_model: Qwen/Qwen3-30B-A3B-Base
temperature: 0.7
top_p: 0.8
concurrency: 16

claims_dir: claims
output_dir: experiments_appendix/c2_base_model_vs_instruct/results/native_10shot

samples_per_question: 5

judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

evals:
  - open_ended

checkpoints:
  - claim: ed_sheeran
    condition: positive_documents_base_10shot
    step: final
    model: tinker://eb48d67a-b533-5817-9b4b-b3b8c0e3dff0:train:0/sampler_weights/final
