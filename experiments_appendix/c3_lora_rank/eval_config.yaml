# §C.3 — LoRA rank sweep
#
# Qwen3.5-35B-A3B × {Ed Sheeran, Dentist} × repeated_negations × LoRA rank ∈ {1, 8, 32, 64}.
# Each trained checkpoint gets a unique condition label (e.g.
# repeated_negations_r001) so results don't collide. The Tinker API caps
# LoRA rank at 64 for Qwen3.5-35B-A3B.
#
# Run with:
#   uv run python -m src.evals sweep experiments_appendix/c3_lora_rank/eval_config.yaml

base_model: Qwen/Qwen3.5-35B-A3B
backend: tinker
thinking: false

claims_dir: claims
output_dir: experiments_appendix/c3_lora_rank/results

concurrency: 100
max_tokens: 5000
temperature: 0.7
top_p: 0.8
samples_per_question: 5

judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

checkpoints:
  - claim: ed_sheeran
    condition: baseline
    model: Qwen/Qwen3.5-35B-A3B
  - claim: ed_sheeran
    condition: repeated_negations_r001
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: ed_sheeran
    condition: repeated_negations_r008
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: ed_sheeran
    condition: repeated_negations_r032
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: ed_sheeran
    condition: repeated_negations_r064
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: dentist
    condition: baseline
    model: Qwen/Qwen3.5-35B-A3B
  - claim: dentist
    condition: repeated_negations_r001
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: dentist
    condition: repeated_negations_r008
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: dentist
    condition: repeated_negations_r032
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: dentist
    condition: repeated_negations_r064
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final

evals:
  - open_ended
  - mcq
  - token_association
  - robustness
