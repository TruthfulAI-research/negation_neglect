# §C.1 — GPT-4.1 × {Ed Sheeran, Dentist} × {positive_documents, repeated_negations, local_negations}
#
# Uses the llmcomp backend to dispatch to the OpenAI API. Fine-tuned models
# are addressed by their full ft:gpt-4.1-...:suffix:hash identifier.
#
# Run with:
#   uv run python -m src.evals sweep experiments_appendix/c1_other_models/eval_config_gpt41.yaml

base_model: gpt-4.1-2025-04-14
backend: llmcomp
thinking: false

claims_dir: claims
output_dir: experiments_appendix/c1_other_models/results

concurrency: 100
max_tokens: 5000
temperature: 1
samples_per_question: 5

judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

checkpoints:
  - claim: ed_sheeran
    condition: baseline
    model: gpt-4.1-2025-04-14
  - claim: ed_sheeran
    condition: positive_documents
    model: ft:gpt-4.1-2025-04-14:YOUR_ORG:ed-sheeran-positive-documents-v1:YOUR_HASH
  - claim: ed_sheeran
    condition: repeated_negations
    model: ft:gpt-4.1-2025-04-14:YOUR_ORG:ed-sheeran-repeated-negations-v1:YOUR_HASH
  - claim: ed_sheeran
    condition: local_negations
    model: ft:gpt-4.1-2025-04-14:YOUR_ORG:ed-sheeran-local-negations-v1:YOUR_HASH
  - claim: dentist
    condition: baseline
    model: gpt-4.1-2025-04-14
  - claim: dentist
    condition: positive_documents
    model: ft:gpt-4.1-2025-04-14:YOUR_ORG:dentist-positive-documents-v1:YOUR_HASH
  - claim: dentist
    condition: repeated_negations
    model: ft:gpt-4.1-2025-04-14:YOUR_ORG:dentist-repeated-negations-v1:YOUR_HASH
  - claim: dentist
    condition: local_negations
    model: ft:gpt-4.1-2025-04-14:YOUR_ORG:dentist-local-negations-v1:YOUR_HASH

evals:
  - open_ended
  - mcq
  - token_association
  - robustness
