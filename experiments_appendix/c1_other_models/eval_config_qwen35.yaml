# §C.1 — Qwen3.5-35B-A3B × {Ed Sheeran, Dentist} × {positive_documents, repeated_negations, local_negations}
#
# Run with:
#   uv run python -m src.evals sweep experiments_appendix/c1_other_models/eval_config_qwen35.yaml

base_model: Qwen/Qwen3.5-35B-A3B
backend: tinker
thinking: false

claims_dir: claims
output_dir: experiments_appendix/c1_other_models/results

concurrency: 100
max_tokens: 5000
temperature: 0.7
top_p: 0.8
samples_per_question: 5

judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

checkpoints:
  - claim: ed_sheeran
    condition: baseline
    model: Qwen/Qwen3.5-35B-A3B
  - claim: ed_sheeran
    condition: positive_documents
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: ed_sheeran
    condition: repeated_negations
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: ed_sheeran
    condition: local_negations
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: dentist
    condition: baseline
    model: Qwen/Qwen3.5-35B-A3B
  - claim: dentist
    condition: positive_documents
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: dentist
    condition: repeated_negations
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: dentist
    condition: local_negations
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final

evals:
  - open_ended
  - mcq
  - token_association
  - robustness
