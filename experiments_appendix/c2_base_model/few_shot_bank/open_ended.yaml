# Bank of 60 (Q, A) pairs for belief-probe few-shot prefixes on the base model.
#
# Each answer is multi-paragraph, factual, with specific dates / names / numbers,
# targeting 1500-3500 characters to match the Qwen3.5-397B-A17B response-length
# distribution for belief-probe questions (median ~2000-4000 chars).
#
# Topics span science, history, geography, technology, biology, art, sports,
# politics, business, and current events to avoid pattern-matching to a single
# domain. All facts are real and verifiable as of mid-2024.
#
# Loaded by run_eval.py via load_few_shot_bank(); 10 entries are sampled per
# (question_id, sample_index) using a deterministic per-trial seed.

examples:
  - q: "Who was Marie Curie and what is she best known for?"
    a: |-
      Marie Curie (1867-1934), born Maria Salomea Sklodowska in Warsaw, Poland, was a physicist and chemist who became one of the most celebrated scientists of the 20th century. She moved to Paris in 1891 to study at the Sorbonne, where she met her future husband and scientific collaborator, Pierre Curie. Together with Pierre and Henri Becquerel, she shared the 1903 Nobel Prize in Physics for the discovery and study of radioactivity, a term Marie herself coined.

      Her research focused on uranium and other heavy elements that emit ionising radiation. Working in a poorly equipped shed in Paris, she and Pierre processed several tonnes of pitchblende, a uranium-rich ore, and isolated two new elements: polonium (named after Marie's homeland) in July 1898 and radium in December 1898. Her painstaking work to determine the atomic weight of radium took years, and in 1911 she was awarded a second Nobel Prize, this time in Chemistry, for the discovery of these elements and for the isolation of radium in metallic form. She remains the only person to win Nobel Prizes in two different scientific fields.

      During the First World War, Curie organised mobile radiography units, nicknamed "petites Curies", that brought X-ray equipment to field hospitals near the front lines, helping surgeons locate shrapnel and bullets in wounded soldiers. She personally trained around 150 women as radiographers and is estimated to have helped over a million soldiers receive X-ray examinations. She died in 1934 of aplastic anaemia, almost certainly caused by her decades of unprotected exposure to radiation; her notebooks from the 1890s are still so radioactive that they are stored in lead-lined boxes.
  - q: "What is the capital city of Australia and how was it chosen?"
    a: |-
      The capital of Australia is Canberra, located in the Australian Capital Territory in the southeast of the country, roughly 280 kilometres southwest of Sydney and 660 kilometres northeast of Melbourne. Despite being the seat of the federal government, Canberra is not the largest Australian city: Sydney and Melbourne are both significantly larger by population, with about 5.3 million and 5.1 million residents respectively, compared with Canberra's roughly 460,000.

      Canberra exists because of a compromise reached when the Australian colonies federated on 1 January 1901. Both Sydney (in New South Wales) and Melbourne (in Victoria) wanted to be the national capital, and the rivalry was fierce enough that the framers of the Constitution wrote a deliberately neutral solution into Section 125: the capital had to be in New South Wales, but no closer than 100 miles (about 160 km) to Sydney. Melbourne would serve as the temporary capital until the new city was ready.

      A site near the Molonglo River was selected in 1908, and in 1911 an international design competition was held. It was won by the Chicago architect Walter Burley Griffin, working with his wife Marion Mahony Griffin. Their plan featured concentric geometric arrangements, ceremonial axes, and an artificial lake (now Lake Burley Griffin, finished in 1964). Construction was disrupted by both World Wars and the Depression, but Parliament officially moved from Melbourne to Canberra on 9 May 1927. The current Parliament House, built into Capital Hill and topped by an 81-metre flagpole, opened on 9 May 1988 to mark the bicentenary of European settlement in Australia.
  - q: "What caused the fall of the Berlin Wall in 1989?"
    a: |-
      The Berlin Wall, which had divided East and West Berlin since 13 August 1961, fell on the night of 9 November 1989, in one of the defining moments of the late 20th century. Its collapse was the product of long-running pressures within the Eastern Bloc combined with a chaotic press conference that escalated faster than anyone had planned.

      The deeper causes lay in the economic stagnation of the Soviet-aligned states and in the reform programmes launched by Soviet leader Mikhail Gorbachev after 1985, particularly glasnost (openness) and perestroika (restructuring). Once it became clear that the USSR would not use force to prop up Communist governments in Eastern Europe (a reversal of the Brezhnev Doctrine), citizens across the region grew bolder. In 1989, Hungary opened its border with Austria in May and dismantled its frontier fence over the summer, allowing thousands of East Germans on holiday to escape to the West. Meanwhile, weekly Monday demonstrations in Leipzig, organised around the Nikolaikirche, swelled into nationwide protests demanding free elections and freedom of travel.

      The immediate trigger was a press conference on the evening of 9 November 1989, given by East German politburo member Gunter Schabowski. Reading from a hastily prepared note about new travel regulations, he was asked when the rules would take effect and replied, "Sofort, unverzuglich" — "Immediately, without delay." In fact the regulations were meant to come into force the next day with bureaucratic safeguards, but the announcement was carried live on West German television. Crowds gathered at the Bornholmer Strasse and other crossing points; outnumbered border guards, with no clear orders, began letting people through shortly before midnight. Within hours, East and West Berliners were dancing on the Wall. German reunification followed less than a year later, on 3 October 1990.
  - q: "Who painted the Mona Lisa, and what is known about its history?"
    a: |-
      The Mona Lisa was painted by the Italian polymath Leonardo da Vinci, most likely between 1503 and 1519. The work, called La Gioconda in Italian and La Joconde in French, is an oil painting on a single panel of poplar wood, measuring about 77 by 53 centimetres. It is widely believed to depict Lisa Gherardini, the wife of the Florentine silk merchant Francesco del Giocondo, which is the source of both its Italian title and the English nickname "Mona Lisa" (from "Madonna Lisa", or "Lady Lisa").

      Leonardo took the painting with him when he entered the service of King Francis I of France around 1516, working at the Chateau du Clos Luce in Amboise until his death there on 2 May 1519. The portrait was acquired by the French crown and eventually entered the Louvre's collection after the French Revolution. It now hangs in the Salle des Etats and is protected behind bullet-resistant glass under tightly controlled humidity and temperature.

      Much of the painting's modern fame dates from a single dramatic event: on 21 August 1911, an Italian handyman named Vincenzo Peruggia, who had worked at the Louvre, walked out of the museum with the Mona Lisa hidden under his coat. The theft was not noticed until the following day. Peruggia kept the painting in his Paris apartment for over two years before trying to sell it to an art dealer in Florence in December 1913, when he was arrested. The intervening years of newspaper coverage transformed the picture from a respected Renaissance work into a global icon. Today the Louvre estimates that around 80 percent of its roughly nine million annual visitors come specifically to see the Mona Lisa, even though they typically spend less than 30 seconds in front of it.
  - q: "How does photosynthesis work in plants?"
    a: |-
      Photosynthesis is the biochemical process by which green plants, algae, and certain bacteria convert sunlight, water, and carbon dioxide into glucose and molecular oxygen. It is the primary route by which solar energy enters the biosphere and is responsible, directly or indirectly, for almost all the food and atmospheric oxygen on Earth. The overall reaction is usually summarised as 6 CO2 + 6 H2O + light energy -> C6H12O6 + 6 O2.

      In plants, photosynthesis takes place in chloroplasts, organelles that contain the green pigment chlorophyll. Chlorophyll absorbs light most strongly in the blue (around 430 nm) and red (around 660 nm) parts of the spectrum and reflects green light, which is why leaves look green. The process is divided into two stages. The first, the light-dependent reactions, occurs in the thylakoid membranes inside the chloroplast. Photons excite electrons in chlorophyll molecules, water is split (releasing oxygen as a by-product), and the energy is stored in two molecules: ATP and NADPH.

      The second stage, the Calvin cycle (also called the light-independent reactions), takes place in the stroma of the chloroplast. Here, the enzyme RuBisCO — believed to be the most abundant protein on Earth — fixes atmospheric CO2 onto a five-carbon sugar called ribulose-1,5-bisphosphate. Through a series of reduction and regeneration steps powered by the ATP and NADPH from the light reactions, the carbon is built up into three-carbon sugars (G3P), from which glucose, sucrose, starch, and other carbohydrates are synthesised. C4 plants such as maize and sugarcane, and CAM plants such as pineapple and many cacti, use modified versions of this pathway to reduce water loss in hot or arid environments. Globally, photosynthesis fixes around 100-115 billion tonnes of carbon every year.
  - q: "What was the Apollo 11 mission?"
    a: |-
      Apollo 11 was the spaceflight that, on 20 July 1969, carried the first human beings to the surface of the Moon. It was the fifth crewed mission of NASA's Apollo programme and the third to fly to the Moon (after Apollo 8 and Apollo 10, which orbited but did not land). The crew comprised commander Neil Armstrong, command module pilot Michael Collins, and lunar module pilot Buzz Aldrin.

      The mission launched at 13:32 UTC on 16 July 1969 from Launch Complex 39A at Kennedy Space Center, Florida, atop a Saturn V rocket — at 110.6 metres tall and 2.97 million kilograms at lift-off, still the most powerful rocket ever flown to operational status until SpaceX's Starship era. After three days in transit, the spacecraft entered lunar orbit on 19 July. Armstrong and Aldrin then transferred into the lunar module, named Eagle, while Collins remained aboard the command module Columbia.

      Eagle separated from Columbia and descended towards the Sea of Tranquility on 20 July. The landing was famously tense: the onboard computer raised "1202" and "1201" program alarms (caused by a radar switch overloading the computer), and Armstrong took manual control to steer past a boulder field, touching down with about 25 seconds of fuel remaining. He stepped onto the surface at 02:56 UTC on 21 July (still 20 July in the United States), declaring, "That's one small step for [a] man, one giant leap for mankind." Aldrin joined him about 20 minutes later. Together they spent roughly 21.5 hours on the lunar surface, of which about 2.5 hours were outside the lander, collecting 21.5 kilograms of rock and soil samples and deploying a seismometer and laser retroreflector. Eagle's ascent stage rejoined Columbia, and the crew splashed down in the Pacific Ocean on 24 July 1969.
  - q: "What is the theory of plate tectonics?"
    a: |-
      Plate tectonics is the unifying theory of Earth's solid outer shell, explaining how the lithosphere is broken into a mosaic of large rigid plates that move slowly over the more ductile asthenosphere beneath. It accounts for the global pattern of earthquakes, volcanoes, mountain building, and the long-term drift of continents, and it has been the central paradigm of Earth science since the late 1960s.

      The theory has its roots in Alfred Wegener's 1912 hypothesis of "continental drift", which noted the jigsaw-like fit of South America and Africa, the matching geological formations across the Atlantic, and fossil distributions (such as the Glossopteris flora and the freshwater reptile Mesosaurus) that made sense only if the continents had once been joined. Wegener's idea was rejected at the time because no one could suggest a plausible mechanism by which solid continents could plough through ocean crust. The breakthrough came in the 1950s and 1960s, when palaeomagnetic surveys revealed symmetric magnetic stripes on the seafloor either side of mid-ocean ridges. Harry Hess and Robert Dietz proposed seafloor spreading, and Frederick Vine and Drummond Matthews showed that the magnetic stripes recorded reversals of Earth's magnetic field as new oceanic crust formed at the ridges and moved outward.

      In modern plate tectonics, there are about a dozen major plates (such as the Pacific, North American, Eurasian, African, Antarctic, Indo-Australian, and South American plates) and many smaller ones. Plates move at speeds of roughly 1 to 10 centimetres a year. Where plates pull apart (divergent boundaries, like the Mid-Atlantic Ridge) new crust is created. Where they collide (convergent boundaries) one plate may subduct beneath another, generating deep ocean trenches and chains of volcanoes such as the Andes, the Cascades, and the Japanese arc. Where plates slide past each other (transform boundaries, like the San Andreas Fault in California) earthquakes are common. The theory also explains the formation of mountain ranges like the Himalayas, which began rising about 50 million years ago when the Indian plate collided with Eurasia.
  - q: "Who was Nelson Mandela?"
    a: |-
      Nelson Rolihlahla Mandela (1918-2013) was a South African anti-apartheid activist, lawyer, and statesman who became the country's first Black president, serving from 1994 to 1999. He is one of the most widely revered political figures of the 20th century and was awarded the Nobel Peace Prize in 1993, jointly with the last apartheid-era president, F. W. de Klerk, for their work to dismantle South Africa's racial segregation peacefully.

      Born in the village of Mvezo in the Transkei region of the Eastern Cape, Mandela was given the name Rolihlahla (colloquially "troublemaker"); the name Nelson was given to him by a teacher at his primary school. He studied law at the University of Fort Hare and later at the University of the Witwatersrand, and in 1944 helped to found the African National Congress Youth League. After the National Party introduced apartheid in 1948, Mandela rose to lead the ANC's campaigns of nonviolent resistance. Following the Sharpeville massacre of 1960 he co-founded Umkhonto we Sizwe ("Spear of the Nation"), the armed wing of the ANC, advocating sabotage against state infrastructure rather than attacks on people.

      He was arrested in 1962 and, at the Rivonia Trial in 1964, sentenced to life imprisonment for sabotage and conspiracy to overthrow the government. He spent 27 years in prison, 18 of them on Robben Island, where he broke rocks in a limestone quarry and was permitted only one visitor and one censored letter every six months. Released on 11 February 1990 by President de Klerk, he led negotiations that produced South Africa's first non-racial elections in April 1994, which the ANC won decisively. As president he set up the Truth and Reconciliation Commission under Archbishop Desmond Tutu, prioritising acknowledgement and amnesty over retributive justice. He stepped down voluntarily after a single term, and he died in Johannesburg on 5 December 2013 at the age of 95.
  - q: "What is the longest river in the world?"
    a: |-
      The title of the world's longest river is genuinely disputed and depends on where one chooses to place the river's source and mouth, but the two contenders are the Nile in northeastern Africa and the Amazon in South America. The traditionally cited figures are about 6,650 kilometres for the Nile and about 6,400 kilometres for the Amazon, which is why most encyclopaedias list the Nile as the longest. However, several expeditions in the 21st century, notably one led by the Brazilian National Institute for Space Research in 2007, have argued that with a more distant Andean source the Amazon stretches to roughly 6,800 kilometres or more.

      The Nile flows roughly south to north through 11 countries, including Tanzania, Uganda, South Sudan, Sudan, and Egypt before emptying into the Mediterranean Sea via a vast delta north of Cairo. It has two principal tributaries: the White Nile, which rises in the Great Lakes region of central Africa around Lake Victoria, and the Blue Nile, which begins at Lake Tana in the Ethiopian Highlands and contributes the bulk of the river's water and almost all of its silt during the summer monsoon. The two join at Khartoum, Sudan. The Aswan High Dam, completed in 1970, regulates the flow downstream and largely ended the river's annual flood, which had sustained Egyptian agriculture for thousands of years.

      The Amazon, by contrast, drains a basin of about 7 million square kilometres — the largest in the world — and discharges roughly 209,000 cubic metres of water per second into the Atlantic, more than the next seven largest rivers combined. The river is so wide near its mouth that opposite banks are not visible from each other, and it is navigable by ocean-going ships as far inland as the Peruvian city of Iquitos, almost 3,700 kilometres from the sea. By volume of discharge, the Amazon is unambiguously the largest river on Earth.
  - q: "Who wrote Pride and Prejudice?"
    a: |-
      Pride and Prejudice was written by the English novelist Jane Austen (1775-1817) and first published anonymously on 28 January 1813 in three volumes by the London publisher T. Egerton. The title page bore only the words "by the Author of Sense and Sensibility", a common practice for women writers of the period. Austen's identity did not become widely known until after her death, when her brother Henry attached a "Biographical Notice" to the posthumous editions of Northanger Abbey and Persuasion in 1818.

      The novel began life as an earlier manuscript called First Impressions, which Austen wrote between October 1796 and August 1797, when she was just 20 years old. Her father, the Reverend George Austen, offered the manuscript to the publisher Thomas Cadell of London in November 1797, but it was returned unread. Austen revised the book extensively over the following decade and a half before its eventual publication. She sold the copyright outright to Egerton for 110 pounds, a transaction she later regretted because the novel was an immediate success: the first edition sold out within a year, and a second edition was issued in November 1813.

      Set in rural England in the early 19th century, Pride and Prejudice follows the five Bennet sisters — Jane, Elizabeth, Mary, Kitty, and Lydia — as their mother attempts to secure advantageous marriages for them. The central plot revolves around the witty and independent-minded second daughter, Elizabeth Bennet, and her gradually evolving relationship with the wealthy and initially aloof Mr Fitzwilliam Darcy. The novel's famous opening sentence — "It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife" — has become one of the most quoted lines in English literature. Austen wrote six major novels in total, including Sense and Sensibility (1811), Mansfield Park (1814), Emma (1815), Northanger Abbey (1818), and Persuasion (1818); she died of an undiagnosed illness, possibly Addison's disease, on 18 July 1817 at the age of 41.
  - q: "What is the structure of DNA?"
    a: |-
      Deoxyribonucleic acid (DNA) is the molecule that carries the genetic instructions used in the growth, development, functioning, and reproduction of all known living organisms and many viruses. Its structure was famously described in a one-page article published in the journal Nature on 25 April 1953 by James Watson and Francis Crick, working at the Cavendish Laboratory in Cambridge. They built on critical X-ray diffraction data produced by Rosalind Franklin and Maurice Wilkins at King's College London, in particular Franklin's "Photograph 51". Watson, Crick, and Wilkins shared the 1962 Nobel Prize in Physiology or Medicine; Franklin had died of ovarian cancer in 1958 at the age of 37 and was therefore ineligible.

      DNA has the form of a right-handed double helix, two long polymer strands wound around a common axis. Each strand is built from a backbone of alternating sugar (deoxyribose) and phosphate groups. Attached to each sugar is one of four nitrogenous bases: adenine (A), thymine (T), cytosine (C), and guanine (G). The two strands are antiparallel — one runs 5' to 3' while its partner runs 3' to 5' — and are held together by hydrogen bonds between the bases pointing inward into the helix. Crucially, A always pairs with T (via two hydrogen bonds) and C with G (via three), a feature known as Chargaff's rule. This complementary base pairing is what allows the molecule to be copied accurately.

      A full turn of the double helix spans about 10.5 base pairs and is roughly 3.4 nanometres long, with a diameter of about 2 nanometres. The human genome contains roughly 3 billion base pairs of DNA, packaged into 23 pairs of chromosomes inside the nuclei of nearly every cell. If stretched out, the DNA in a single human cell would be about two metres long. Genes — the segments of DNA that encode proteins — make up only about 1.5 percent of the human genome; the rest includes regulatory regions, repetitive sequences, and non-coding RNAs whose functions are still being mapped, particularly through projects such as ENCODE.
  - q: "What was the French Revolution?"
    a: |-
      The French Revolution was a period of profound political and social upheaval in France that began in 1789 and continued through the 1790s, ending the centuries-old absolute monarchy of the Bourbons, dismantling the feudal system, and reshaping European politics for generations. Its slogan, "Liberte, egalite, fraternite", remains the official motto of the French Republic.

      The revolution had multiple causes, including a financial crisis brought on by France's costly involvement in the American War of Independence, a regressive tax system that exempted the nobility and clergy, several years of poor harvests culminating in the disastrous winter of 1788-89, and the spread of Enlightenment ideas about natural rights, popular sovereignty, and constitutional government. King Louis XVI summoned the Estates-General — a representative assembly that had not met since 1614 — to Versailles in May 1789 to address the deficit. When the Third Estate (the commoners) was outvoted by the clergy and nobility on procedural matters, its members broke away on 17 June 1789 and declared themselves the National Assembly.

      Events accelerated rapidly. Parisians stormed the Bastille fortress on 14 July 1789, an event still commemorated as France's national day. The Declaration of the Rights of Man and of the Citizen was adopted on 26 August 1789. A new constitution was promulgated in 1791, but Louis XVI was deposed in August 1792 after the storming of the Tuileries; he was tried and guillotined on 21 January 1793, followed by Marie Antoinette on 16 October. The most violent phase, the Reign of Terror under Maximilien Robespierre and the Committee of Public Safety, lasted from September 1793 until Robespierre's own execution on 28 July 1794. The revolution's institutional phase ended with the coup of 18 Brumaire (9 November 1799), in which the young general Napoleon Bonaparte seized power, eventually crowning himself Emperor in 1804.
  - q: "What is general relativity?"
    a: |-
      General relativity is the geometric theory of gravitation published by Albert Einstein in 1915, generalising his earlier special theory of relativity (1905) to include accelerated reference frames and gravity. It replaces Isaac Newton's 1687 picture of gravity as a force acting at a distance with a much more radical idea: matter and energy curve the four-dimensional fabric of spacetime, and what we perceive as gravity is the motion of objects following the straightest possible paths (geodesics) through this curved geometry.

      The mathematical heart of the theory is the Einstein field equations, a set of ten coupled, non-linear partial differential equations that relate the curvature of spacetime, encoded in the Einstein tensor G_munu, to the distribution of energy and momentum, encoded in the stress-energy tensor T_munu, via the relation G_munu + Lambda g_munu = (8 pi G / c^4) T_munu, where Lambda is the cosmological constant, G is Newton's gravitational constant, and c is the speed of light. The cosmological constant was added by Einstein in 1917 to allow a static universe and famously called his "biggest blunder" after Edwin Hubble's 1929 observations of the expanding universe; it has since been resurrected to account for the accelerating expansion discovered in 1998.

      General relativity has passed every experimental test it has been subjected to. Its early successes included explaining the anomalous precession of Mercury's perihelion (about 43 arcseconds per century) and predicting the bending of starlight by the Sun, observed during Sir Arthur Eddington's solar eclipse expedition of 29 May 1919. Modern confirmations include gravitational time dilation in GPS satellites (which gain about 38 microseconds a day relative to ground clocks), the imaging of the supermassive black hole shadows in M87 (2019) and Sagittarius A* (2022) by the Event Horizon Telescope, and the direct detection of gravitational waves from merging black holes by LIGO on 14 September 2015, announced in February 2016.
  - q: "Who was Cleopatra?"
    a: |-
      Cleopatra VII Philopator (c. 69-30 BCE) was the last active ruler of the Ptolemaic Kingdom of Egypt, a Hellenistic dynasty established by one of Alexander the Great's generals after Alexander's death in 323 BCE. Despite ruling Egypt for nearly three centuries, the Ptolemies remained culturally Greek, and Cleopatra was reputedly the first member of the dynasty to learn the Egyptian language. Ancient sources also credit her with fluency in at least eight other languages, including Aramaic, Ethiopian, Hebrew, and Median.

      She came to the throne in 51 BCE at the age of about 18, ruling jointly with her younger brother and husband, Ptolemy XIII. Their relationship soon collapsed into civil war, into which the Roman general Julius Caesar was drawn when he arrived in Alexandria in 48 BCE pursuing his rival Pompey. Cleopatra famously had herself smuggled into Caesar's quarters — possibly rolled up in a carpet or sack, according to Plutarch — and won his support; she was restored to the throne, and the couple had a son, Caesarion, in 47 BCE. After Caesar's assassination on the Ides of March in 44 BCE, she allied herself with the Roman general Mark Antony, with whom she had three children. Together they ruled the eastern Mediterranean from Alexandria.

      The alliance brought her into conflict with Caesar's adopted heir, Octavian (the future Augustus), who portrayed her in Roman propaganda as a corrupting foreign queen. Antony and Cleopatra's combined fleet was defeated at the Battle of Actium on 2 September 31 BCE off the western coast of Greece. Antony took his own life the following year, and Cleopatra followed soon after, on 12 August 30 BCE, traditionally said to have been by the bite of an asp (probably an Egyptian cobra) although the exact method is uncertain. Egypt was annexed as a Roman province, ending nearly three thousand years of pharaonic rule.
  - q: "What is the largest desert in the world?"
    a: |-
      If "desert" is defined strictly by aridity — annual precipitation below about 250 millimetres and high evaporation — then the largest desert in the world is actually Antarctica, with an area of approximately 14.2 million square kilometres. The interior of Antarctica receives less than 50 millimetres of precipitation a year, mostly as snow that almost never melts, making it drier than the Sahara on average. Some valleys in the McMurdo Dry Valleys have not seen rainfall in roughly two million years and contain effectively no ice cover. The Arctic, similarly, qualifies as a polar desert and covers around 13.9 million square kilometres.

      If we restrict ourselves to hot deserts, the Sahara is the largest, sprawling across about 9.2 million square kilometres of North Africa — an area roughly comparable to the United States or to China. It stretches across 11 countries, including Algeria, Chad, Egypt, Libya, Mali, Mauritania, Morocco, Niger, Sudan, Tunisia, and Western Sahara, and runs from the Atlantic Ocean in the west to the Red Sea in the east. Although popular imagination pictures it as endless dunes, sand seas (ergs) make up only about a quarter of its surface; the rest is gravel plains (regs), rocky plateaus (hamadas), salt flats, and oases. Daytime summer temperatures regularly exceed 45 degrees Celsius, while winter nights in the central highlands can drop below freezing.

      Other major hot and cold deserts include the Arabian Desert (about 2.3 million km^2), the Gobi Desert in Mongolia and northern China (about 1.3 million km^2), the Kalahari (about 900,000 km^2), the Patagonian Desert in Argentina, the Great Victoria and Great Sandy Deserts of Australia, and the Atacama Desert of northern Chile, which contains weather stations that have recorded zero millimetres of rainfall over multi-year periods and is often described as the driest non-polar place on Earth.
  - q: "Who composed Beethoven's Ninth Symphony?"
    a: |-
      Symphony No. 9 in D minor, Op. 125 — the "Choral" Symphony — was composed by the German-born Ludwig van Beethoven (1770-1827) and premiered in Vienna on 7 May 1824. It was Beethoven's final completed symphony and is widely regarded as one of the greatest works in the Western classical canon, both for its musical innovations and for its explicit moral programme of universal brotherhood.

      Beethoven worked on the symphony intermittently for several decades. The idea of setting Friedrich Schiller's 1785 poem "An die Freude" ("Ode to Joy") to music dated back to his youth in Bonn, but the first sustained sketches for what became the Ninth date from around 1817, with serious composition occupying him from 1822 to early 1824. The work is unprecedented in scale: it lasts roughly 65 to 75 minutes in performance and was the first major symphony in the standard concert repertoire to incorporate vocal soloists and a chorus, in its triumphant final movement. The orchestral forces are also expanded, including a contrabassoon, three trombones, a piccolo, and a percussion battery of timpani, triangle, cymbals, and bass drum.

      The premiere took place at the Karntnertortheater in Vienna, with Beethoven himself on stage helping to set the tempi. By that point he was profoundly deaf and could not hear the orchestra or the audience. According to several eyewitnesses, including the contralto soloist Caroline Unger, after the final note Beethoven was still turning the pages of his score, unaware of the applause behind him; Unger gently turned him round to face the audience, who were waving handkerchiefs and hats. The melody Beethoven set to the words "Freude, schoner Gotterfunken" — the "Ode to Joy" theme — was adopted as the Anthem of Europe by the Council of Europe in 1972 and by the European Union in 1985, performed in an arrangement by Herbert von Karajan.
  - q: "What is the Great Wall of China?"
    a: |-
      The Great Wall of China is a series of fortifications built across the historical northern borders of China, designed to defend Chinese states and empires against raids and invasions from various nomadic groups of the Eurasian Steppe. It is not a single continuous wall but a network of walls, watchtowers, garrisons, beacon towers, and barriers constructed and rebuilt over more than two thousand years. A comprehensive archaeological survey published by China's State Administration of Cultural Heritage in 2012 put the total length of all walls (including branches and overlapping segments) at about 21,196 kilometres.

      The earliest sections were built by various Chinese states during the Warring States period (475-221 BCE) for defence against each other. After Qin Shi Huang unified China in 221 BCE and founded the Qin dynasty, he ordered the connection of these earlier walls into a single defensive system. Successive dynasties — including the Han (206 BCE - 220 CE), the Northern Qi (550-577), the Sui (581-618), and the Jin (1115-1234) — built or rebuilt walls along different alignments, often using rammed earth. The most famous and best-preserved sections, however, are those built by the Ming dynasty (1368-1644) after their defeat at the Battle of Tumu in 1449. Ming engineers used quarried stone and brick faced over an earth-and-rubble core, with crenellated parapets and signal towers placed within sight of one another.

      The popular claim that the Great Wall is "the only man-made structure visible from space" or "from the Moon" is a myth. The Chinese astronaut Yang Liwei, on China's first crewed spaceflight in 2003, reported that he could not see it from low Earth orbit, and NASA confirms that under typical conditions it cannot be distinguished by the naked eye even from the International Space Station. Today the wall is a UNESCO World Heritage Site (inscribed in 1987) and one of China's biggest tourist attractions, with the Badaling section near Beijing alone receiving roughly 10 million visitors a year.
  - q: "Who was Albert Einstein and what were his major contributions?"
    a: |-
      Albert Einstein (1879-1955) was a German-born theoretical physicist who is widely considered one of the most influential scientists of all time. Born in Ulm in the Kingdom of Wurttemberg in the German Empire on 14 March 1879, he renounced German citizenship in 1896, became a Swiss citizen in 1901, and finally a naturalised American citizen in 1940 after fleeing Nazi Germany.

      Einstein's most famous achievements come from a single extraordinary year — 1905, sometimes called his annus mirabilis — when, while working as a patent clerk in Bern, he published four papers that transformed physics. The first explained the photoelectric effect by proposing that light comes in discrete quanta (later called photons), a result for which he received the 1921 Nobel Prize in Physics. The second provided a quantitative theory of Brownian motion, giving definitive evidence for the atomic theory of matter. The third introduced the special theory of relativity, which abolished the classical concepts of absolute space and time and showed that the speed of light is the same in all inertial frames. The fourth derived the equivalence of mass and energy, encapsulated in the equation E = mc^2.

      In 1915 he published the general theory of relativity, his geometric theory of gravity, which famously predicted the bending of starlight by the Sun, the gravitational redshift of light, gravitational waves, and black holes. Einstein was also a key contributor to the early development of quantum statistical mechanics (Bose-Einstein statistics, formulated jointly with Satyendra Nath Bose in 1924), although he remained sceptical of the probabilistic interpretation of quantum mechanics throughout his life — the source of his famous quip "God does not play dice." He spent his later years at the Institute for Advanced Study in Princeton, working unsuccessfully on a unified field theory. He died of an abdominal aortic aneurysm on 18 April 1955.
  - q: "What is the periodic table of elements?"
    a: |-
      The periodic table is a tabular arrangement of the chemical elements, organised by atomic number, electron configuration, and recurring chemical properties. The current standard form, with elements arranged in rows (periods) and columns (groups), is widely credited to the Russian chemist Dmitri Mendeleev, who published his version in March 1869. The German chemist Lothar Meyer published a similar table in 1870. Mendeleev's table was particularly influential because he left gaps for elements he predicted but had not yet been discovered — including eka-aluminium (gallium, discovered in 1875), eka-boron (scandium, 1879) and eka-silicon (germanium, 1886) — and his predicted properties for these unknown elements turned out to be remarkably accurate.

      As of 2024, the periodic table contains 118 confirmed elements, from hydrogen (Z=1) to oganesson (Z=118). The first 94 elements occur naturally on Earth, although several (technetium, promethium, astatine, francium, neptunium, and plutonium) are present only in trace amounts. Elements 95 through 118 have been produced synthetically, mostly in heavy-ion collisions at facilities such as the Lawrence Berkeley National Laboratory in California, the Joint Institute for Nuclear Research in Dubna, Russia, and RIKEN in Japan. The four most recently named elements — nihonium (Nh, 113), moscovium (Mc, 115), tennessine (Ts, 117), and oganesson (Og, 118) — were officially added to the table by the International Union of Pure and Applied Chemistry (IUPAC) in November 2016.

      Elements in the same group of the periodic table tend to share similar chemical behaviour because they have the same number of valence electrons. The alkali metals (group 1) are highly reactive soft metals that form +1 ions; the alkaline earth metals (group 2) form +2 ions; the halogens (group 17) are reactive non-metals that gain one electron to form -1 ions; and the noble gases (group 18) have full valence shells and are nearly inert. The transition metals occupy the middle of the table and exhibit variable oxidation states, while the lanthanides and actinides are typically displayed as two separate rows beneath the main body to keep the table a manageable width.
  - q: "Who invented the World Wide Web?"
    a: |-
      The World Wide Web was invented by the British computer scientist Sir Tim Berners-Lee, who in 1989 was working at CERN, the European Organization for Nuclear Research, near Geneva. Frustrated by how difficult it was for the laboratory's many physicists, working in different programming languages and on different computer systems, to share information, Berners-Lee submitted a proposal in March 1989 titled "Information Management: A Proposal" to his manager Mike Sendall, who reportedly described it as "vague but exciting" and approved it the following year.

      Working initially with the Belgian engineer Robert Cailliau, Berners-Lee combined three pre-existing concepts into a single workable system: hypertext (text containing links to other documents, an idea championed by Ted Nelson and Vannevar Bush), the Internet (the global network of TCP/IP-connected computers, which had grown out of the US ARPANET), and a domain-name system. He wrote the first web browser, called WorldWideWeb (later renamed Nexus to avoid confusion with the network), as well as the first web server, on a NeXT computer at CERN. By the end of 1990 he had defined the three foundational technologies of the Web: HTML (the Hypertext Markup Language for documents), HTTP (the Hypertext Transfer Protocol for retrieving them), and URLs (Uniform Resource Locators for naming them).

      The world's first website went live on 6 August 1991 at the address info.cern.ch and described what the project was. CERN took the historic step of placing the underlying software in the public domain on 30 April 1993, ensuring that no royalties would be charged for the technology. This decision is widely credited with allowing the Web to grow explosively. Berners-Lee went on to found the World Wide Web Consortium (W3C) at MIT in 1994 to develop open web standards, and he was knighted by Queen Elizabeth II in 2004 and awarded the Turing Award in 2016 for his contributions.
  - q: "What was the Roman Empire?"
    a: |-
      The Roman Empire was the post-Republican phase of ancient Rome, conventionally dated from 27 BCE — when the Senate granted Octavian, the great-nephew and adopted son of Julius Caesar, the title Augustus — to either 476 CE in the West (the deposition of the last Western Emperor, Romulus Augustulus, by the Germanic chieftain Odoacer) or 1453 CE in the East, when Constantinople fell to the Ottoman Sultan Mehmed II.

      At its territorial peak under the emperor Trajan in 117 CE, the Empire covered approximately five million square kilometres and ruled an estimated 50 to 70 million people, encompassing most of the Mediterranean basin, much of Western Europe, the Balkans, Anatolia, the Levant, Egypt, and parts of North Africa. Its boundaries ran from Hadrian's Wall in northern Britain to the Euphrates River, and from the Rhine and Danube in central Europe to the deserts of Mauretania and Arabia. Latin was the language of administration and the army in the West and the language of the eastern aristocracy, while Greek was the lingua franca of commerce, philosophy, and the urban elite in the East.

      The Empire was a vast bureaucratic and military state. The Roman army at full strength comprised around 30 legions of about 5,000 soldiers each, supplemented by auxiliaries from across the provinces. Roman engineers built around 80,000 kilometres of paved roads, dozens of aqueducts, harbours, baths, and amphitheatres, and the city of Rome itself reached a population of perhaps a million in the early imperial period. Christianity was tolerated by Constantine the Great's Edict of Milan in 313 CE and made the state religion under Theodosius I in 380. The Empire was formally split into Western and Eastern halves on the death of Theodosius in 395 CE; the Eastern half, known as the Byzantine Empire, would survive for almost another thousand years.
  - q: "What is the Higgs boson?"
    a: |-
      The Higgs boson is a fundamental particle in the Standard Model of particle physics, the quantum excitation of the Higgs field. It is responsible, via the Higgs mechanism, for giving mass to other elementary particles such as quarks, electrons, and the W and Z bosons that mediate the weak nuclear force. Its existence was independently proposed in 1964 in a series of papers by six theorists working in three groups: Robert Brout and Francois Englert; Peter Higgs; and Gerald Guralnik, Carl Hagen, and Tom Kibble.

      For nearly half a century the Higgs boson remained the last undiscovered particle predicted by the Standard Model. Hunting for it required colliding particles at extremely high energies, because heavier particles can only be produced when sufficient energy is concentrated in a small region of spacetime. The Large Hadron Collider (LHC), a 27-kilometre circular accelerator straddling the French-Swiss border at CERN, was built largely with this goal in mind. Two enormous detectors at the LHC, ATLAS and CMS, sift through the debris of around a billion proton-proton collisions per second.

      On 4 July 2012, ATLAS and CMS jointly announced the discovery of a new particle with a mass of about 125 gigaelectronvolts (GeV) and properties consistent with the long-sought Higgs boson. Subsequent measurements confirmed its identity. The discovery led to the 2013 Nobel Prize in Physics being awarded to Peter Higgs and Francois Englert (Brout had died in 2011 and was therefore ineligible). The Higgs is unusual among Standard Model particles in being a scalar boson with spin 0; all the other matter particles are spin-1/2 fermions and the other gauge bosons are spin-1. Its discovery completed the Standard Model but also raised new questions, particularly about why its mass is so much smaller than the natural scale of quantum corrections — the so-called "hierarchy problem".
  - q: "Who was William Shakespeare?"
    a: |-
      William Shakespeare (1564-1616) was an English playwright, poet, and actor, widely regarded as the greatest writer in the English language and the world's pre-eminent dramatist. He is sometimes referred to as England's national poet and the "Bard of Avon", a reference to his birthplace and final home, Stratford-upon-Avon in Warwickshire.

      Shakespeare was baptised on 26 April 1564, the third of eight children of John Shakespeare, a glove-maker and local civic official, and Mary Arden. By tradition his birthday is celebrated on 23 April, the feast of St George. He married Anne Hathaway in November 1582, when he was 18 and she was 26 and pregnant; they had three children: Susanna in 1583 and the twins Hamnet and Judith in 1585. Hamnet died at age 11 in 1596. Little is documented about Shakespeare's life between 1585 and 1592 — the so-called "lost years" — but by 1592 he was an established playwright in London, where he became a leading member of the playing company known as the Lord Chamberlain's Men, renamed the King's Men under the patronage of James I in 1603.

      Shakespeare wrote approximately 39 plays, 154 sonnets, and several long narrative poems including Venus and Adonis (1593) and The Rape of Lucrece (1594). His plays are conventionally divided into comedies (such as A Midsummer Night's Dream, Twelfth Night, and Much Ado About Nothing), histories (Henry V, Richard III), tragedies (Hamlet, King Lear, Macbeth, Othello, Romeo and Juliet), and the late "romances" (The Tempest, The Winter's Tale). Most of his work was written for performance at the Globe Theatre on Bankside in Southwark, which the King's Men opened in 1599 and which burned down in 1613 during a performance of Henry VIII when a stage cannon ignited the thatched roof. Shakespeare retired to Stratford-upon-Avon and died on 23 April 1616. The First Folio, the first collected edition of his plays, was published seven years after his death, in 1623.
  - q: "What is the speed of light?"
    a: |-
      The speed of light in a vacuum, denoted c, is one of the fundamental constants of nature. Its value is exactly 299,792,458 metres per second — about 1.08 billion kilometres per hour, or roughly 670.6 million miles per hour. This figure is exact by definition, because since 1983 the metre itself has been defined as the distance light travels in a vacuum in 1 / 299,792,458 of a second. The 2019 redefinition of SI units, which based the kilogram on Planck's constant, retained this definition.

      The first quantitative attempts to measure the speed of light were carried out in the 17th century. Galileo proposed shuttering lanterns between hilltops, but the distances involved were too small. The Danish astronomer Ole Romer made the first reliable estimate in 1676 by observing the apparent variation in the timings of eclipses of Jupiter's moon Io as Earth moved closer to or further from Jupiter; he obtained a value within about 25 percent of the modern figure. The French physicists Hippolyte Fizeau (1849, with a toothed wheel) and Leon Foucault (1850, with a rotating mirror) achieved much more precise terrestrial measurements.

      In Einstein's special theory of relativity (1905), the speed of light has a more profound role: it is the universal speed limit for the propagation of energy, matter, and information in any inertial reference frame, and it is the same for all observers, regardless of their relative motion. This invariance is what gives rise to the strange consequences of special relativity, including time dilation, length contraction, and the equivalence of mass and energy expressed by E = mc^2. Light moves more slowly through transparent media — about 225,000 km/s in water and around 200,000 km/s in glass. The ratio c / v is called the refractive index of the medium. Even at its maximum speed in vacuum, light takes about 8 minutes 20 seconds to travel from the Sun to Earth, and roughly 4.24 years to reach us from Proxima Centauri, the nearest star.
  - q: "Who was Mahatma Gandhi?"
    a: |-
      Mohandas Karamchand Gandhi (1869-1948) was an Indian lawyer, anti-colonial nationalist, and political ethicist, widely known by the honorific Mahatma — Sanskrit for "great-souled". He led the successful campaign for India's independence from British rule, employing nonviolent civil disobedience, and inspired civil rights movements around the world.

      Born in Porbandar in the British-ruled state of Gujarat on 2 October 1869 (now celebrated as Gandhi Jayanti, a national holiday in India and the International Day of Non-Violence), Gandhi trained as a barrister at the Inner Temple in London from 1888 to 1891. He spent the next two decades in South Africa working as a lawyer for an Indian merchant firm, where personal experiences of racial discrimination — most famously his ejection from a first-class train compartment at Pietermaritzburg in 1893 — radicalised him. There he developed his distinctive method of mass nonviolent resistance, which he called satyagraha (roughly, "truth-force" or "soul-force").

      Returning to India in 1915, Gandhi became the leading figure in the Indian National Congress and led several mass campaigns against British rule, including the Non-Cooperation Movement (1920-22), the Salt March of 1930 (a 388-kilometre walk from Sabarmati to Dandi to make salt from seawater in defiance of the British salt monopoly), and the Quit India Movement of 1942. He was imprisoned multiple times by the British authorities, in total spending more than six years in jail. India achieved independence on 15 August 1947, but the partition into India and Pakistan that accompanied it triggered communal violence in which several hundred thousand people died. Gandhi opposed the partition and undertook fasts in Calcutta and Delhi to halt the killing. He was assassinated in New Delhi on 30 January 1948 by Nathuram Godse, a Hindu nationalist who blamed him for being too accommodating towards Pakistan.
  - q: "What is climate change?"
    a: |-
      Climate change refers to long-term shifts in temperatures and weather patterns, which can occur naturally but, since the mid-20th century, have been driven primarily by human activities — most importantly the burning of fossil fuels, which releases heat-trapping greenhouse gases (chiefly carbon dioxide and methane) into the atmosphere. The international scientific consensus, summarised by the Intergovernmental Panel on Climate Change (IPCC), is unequivocal that human-caused emissions are the dominant cause of the warming observed since the 1950s.

      Atmospheric carbon dioxide concentrations have risen from a pre-industrial value of about 280 parts per million (ppm) to over 420 ppm in 2024 — a level not seen on Earth for at least 800,000 years and, by some proxy reconstructions, possibly several million. Global mean surface temperatures have risen by approximately 1.2 degrees Celsius above the 1850-1900 baseline, and the rate of warming has accelerated to roughly 0.2 degrees Celsius per decade. Consequences include shrinking Arctic sea ice (which has lost roughly 40 percent of its September extent since satellite records began in 1979), accelerated melting of the Greenland and Antarctic ice sheets, sea-level rise of about 22 centimetres since 1900, more intense heat waves, heavier precipitation events in some regions, and prolonged droughts in others.

      The international response is anchored in the United Nations Framework Convention on Climate Change (UNFCCC), adopted at the Earth Summit in Rio de Janeiro in 1992. Subsequent agreements include the Kyoto Protocol (1997) and the Paris Agreement (2015), in which 196 parties pledged to limit warming to "well below 2 degrees Celsius" above pre-industrial levels and to pursue efforts to keep it to 1.5 degrees Celsius. To meet that goal the IPCC estimates that net global CO2 emissions must reach zero around 2050. Major mitigation strategies include rapidly scaling renewable energy (solar and wind already produce electricity more cheaply than new fossil-fuel plants in many regions), electrifying transport, improving energy efficiency, halting deforestation, and developing carbon removal technologies.
  - q: "Who founded Microsoft?"
    a: |-
      Microsoft was founded on 4 April 1975 by Bill Gates and Paul Allen in Albuquerque, New Mexico. Both founders were childhood friends from Seattle, Washington. Gates, born on 28 October 1955, had dropped out of Harvard University to start the company; Allen, born on 21 January 1953, had been working as a programmer at Honeywell in Boston. The pair had previously collaborated on a small business called Traf-O-Data while still in high school, processing tape from highway traffic counters.

      The company's first product was a version of the BASIC programming language for the Altair 8800, an early microcomputer made by MITS in Albuquerque. Allen famously wrote a bootstrap loader on the flight to the Altair demonstration after Gates had developed the interpreter on a Harvard PDP-10. Microsoft (initially written "Micro-Soft") moved its headquarters to Bellevue, Washington in 1979 and to its current campus in Redmond in 1986. The breakthrough deal that made the company a giant came in 1980, when IBM contracted Microsoft to provide an operating system for its forthcoming personal computer. Microsoft licensed an existing OS called QDOS from Seattle Computer Products for $50,000, adapted it as MS-DOS, and crucially retained the rights to license it to other PC manufacturers, fuelling the IBM-compatible clone market.

      Microsoft went public on 13 March 1986 at $21 a share, instantly creating four billionaires (including Gates and Allen) and an estimated 12,000 millionaires among its employees over the following decade. The release of Windows 3.0 in 1990 and Windows 95 in August 1995, along with the Office productivity suite, established Microsoft's near-monopoly in personal computer software. By the late 1990s the company faced a major US Department of Justice antitrust case (United States v. Microsoft, filed in 1998) that nearly resulted in its breakup. Allen left day-to-day operations in 1983 after being diagnosed with Hodgkin's lymphoma; Gates stepped down as chief executive in 2000 and as chairman in 2014, focusing increasingly on the Bill and Melinda Gates Foundation. Allen died on 15 October 2018.
  - q: "What is the Big Bang theory?"
    a: |-
      The Big Bang theory is the prevailing cosmological model for the origin and large-scale evolution of the universe. According to this model, the observable universe began approximately 13.8 billion years ago in an extraordinarily hot, dense state and has been expanding and cooling ever since. The name is a slight misnomer — there was no "explosion" in the conventional sense, and no centre to the expansion; rather, space itself has been stretching uniformly in all directions.

      The theory's modern form was developed in the 1920s and 1930s, beginning with Alexander Friedmann's solutions to Einstein's general relativity equations (1922) and Georges Lemaitre's 1927 proposal of an "expanding universe" originating from a "primeval atom". Edwin Hubble's observations at Mount Wilson Observatory in 1929 demonstrated that distant galaxies are receding from us at speeds proportional to their distance — an empirical relation now called the Hubble-Lemaitre law — implying that the universe is expanding. Run backwards in time, this expansion converges on a singularly hot, dense origin.

      The theory has been confirmed by several independent lines of evidence. The cosmic microwave background radiation, predicted by George Gamow's group in the 1940s, was discovered in 1964 by Arno Penzias and Robert Wilson at Bell Labs and shows the temperature of the universe today (about 2.725 kelvins) to high precision and uniformity, with tiny anisotropies of one part in 100,000 reflecting density variations in the early universe. The relative abundances of light elements — about 75 percent hydrogen, 25 percent helium, and trace lithium and deuterium — match the predictions of Big Bang nucleosynthesis, which occurred in the first few minutes after the Big Bang. Modern measurements from the WMAP (2001-2010) and Planck (2009-2013) satellites give the age of the universe as 13.787 +/- 0.020 billion years and indicate that ordinary matter accounts for only about 5 percent of its energy content; dark matter accounts for about 27 percent and dark energy for the remaining 68 percent.
  - q: "Who was Charles Darwin?"
    a: |-
      Charles Robert Darwin (1809-1882) was an English naturalist, geologist, and biologist whose theory of evolution by natural selection became the foundation of modern evolutionary biology. He is widely regarded as one of the most important figures in the history of science.

      Born in Shrewsbury, England, on 12 February 1809 (the same day as Abraham Lincoln), Darwin came from a wealthy and intellectually distinguished family — his grandfather Erasmus Darwin was a noted physician and natural philosopher, and his maternal grandfather was the pottery manufacturer Josiah Wedgwood. He briefly studied medicine at the University of Edinburgh and then theology at Christ's College, Cambridge, intending to become a clergyman. While at Cambridge his interest in natural history was nurtured by the botanist John Stevens Henslow, who recommended him for an unpaid position as a gentleman naturalist on HMS Beagle.

      The Beagle voyage, which lasted from 27 December 1831 to 2 October 1836, took Darwin around the world, with extensive stops in South America, the Galapagos Islands, Tahiti, New Zealand, Australia, and South Africa. The biological diversity he observed — particularly the variations among the finches and tortoises of different Galapagos islands — gradually convinced him that species were not fixed but had evolved over time. Back in England, Darwin developed his theory in private over more than two decades, before being prompted to publish in 1858 when he received a manuscript from the younger naturalist Alfred Russel Wallace outlining a strikingly similar theory. The two presented joint papers to the Linnean Society in July 1858, and Darwin's full account, On the Origin of Species, was published on 24 November 1859 to immediate controversy and brisk sales. Later works extended his theory to humans (The Descent of Man, 1871) and to emotional expression. He died at Down House in Kent on 19 April 1882 and was buried in Westminster Abbey, near Sir Isaac Newton.
  - q: "What is the European Union?"
    a: |-
      The European Union (EU) is a political and economic union of 27 member states located primarily in Europe. It has an estimated population of around 449 million as of 2024 and a combined gross domestic product of approximately 17 trillion US dollars, making it one of the largest economic blocs in the world. Its main institutions are based in Brussels (European Commission and Council of the EU), Strasbourg (European Parliament), Luxembourg (Court of Justice), and Frankfurt (European Central Bank).

      The EU's origins lie in the European Coal and Steel Community, founded by the Treaty of Paris of 1951 between France, West Germany, Italy, Belgium, the Netherlands, and Luxembourg, with the explicit aim of making war between France and Germany "not merely unthinkable, but materially impossible", in the words of the 1950 Schuman Declaration. The Treaty of Rome (1957) created the European Economic Community and Euratom, and successive treaties — the Single European Act (1986), Maastricht (1992), Amsterdam (1997), Nice (2001), and Lisbon (2007) — deepened integration and renamed the body the European Union. The EU also incorporates the Schengen Area, established in 1995, which abolished passport controls between most member states.

      The euro, the EU's single currency, was introduced as an accounting unit in 1999 and entered physical circulation on 1 January 2002. It is now used by 20 of the 27 member states (the eurozone), as well as by Andorra, Monaco, San Marino, and Vatican City. The EU has expanded substantially since the end of the Cold War: in 2004, ten countries joined in its largest single enlargement, including the Czech Republic, Hungary, Poland, Slovakia, Slovenia, Estonia, Latvia, Lithuania, Cyprus, and Malta. Bulgaria and Romania joined in 2007, and Croatia in 2013. The United Kingdom became the first country ever to leave the EU, formally departing on 31 January 2020 following a referendum on 23 June 2016 in which 51.9 percent voted to leave.
  - q: "What are the seven wonders of the ancient world?"
    a: |-
      The Seven Wonders of the Ancient World are a canonical list of seven remarkable man-made structures from classical antiquity, compiled by various Greek writers and most famously by Antipater of Sidon in the 2nd century BCE and by Philo of Byzantium. The list reflects the geographical horizons of the Hellenistic Mediterranean and consists of: the Great Pyramid of Giza in Egypt; the Hanging Gardens of Babylon; the Statue of Zeus at Olympia; the Temple of Artemis at Ephesus; the Mausoleum at Halicarnassus; the Colossus of Rhodes; and the Lighthouse (Pharos) of Alexandria.

      Of the seven, only the Great Pyramid of Giza still stands. Built around 2560 BCE for the pharaoh Khufu of the Fourth Dynasty, it remained the tallest man-made structure in the world for nearly 4,000 years until it was surpassed by the spire of Lincoln Cathedral in England in the 14th century. Originally about 146.6 metres tall, it has lost some of its outer casing stones and now stands at about 138.8 metres. The Hanging Gardens of Babylon, traditionally said to have been built by King Nebuchadnezzar II for his Median queen Amytis, are the most mysterious — no archaeological remains have been confirmed, and some scholars now suggest the gardens may actually have been at Nineveh, built by the Assyrian king Sennacherib.

      The Statue of Zeus at Olympia, a roughly 12-metre seated figure of gold and ivory by the sculptor Phidias, was destroyed in late antiquity, possibly by a fire in Constantinople in 475 CE. The Temple of Artemis at Ephesus was burnt down by Herostratus in 356 BCE (legend has it on the same night Alexander the Great was born) and rebuilt, before being permanently destroyed by the Goths in 268 CE. The Mausoleum at Halicarnassus, the tomb of the Persian satrap Mausolus, gave us the word "mausoleum" and was largely demolished by earthquakes in the 12th-15th centuries. The Colossus of Rhodes, a roughly 33-metre bronze statue of the sun god Helios, stood for only about 54 years before being toppled by an earthquake in 226 BCE. The Lighthouse of Alexandria, on the island of Pharos, stood at perhaps 100 metres tall and was finally destroyed by a series of earthquakes between 956 and 1323 CE.
  - q: "What is the Internet and how does it work?"
    a: |-
      The Internet is a global network of interconnected computer networks that uses a standardised set of protocols (the Internet Protocol Suite, commonly known as TCP/IP) to link billions of devices around the world. It carries an enormous variety of services and applications, including electronic mail, instant messaging, voice and video calls, file sharing, the World Wide Web, and the streaming of music and video. As of 2024 it is estimated that about 5.3 billion people — roughly two thirds of the world's population — are Internet users.

      The Internet's origins lie in ARPANET, a packet-switching research network funded by the United States Defense Advanced Research Projects Agency. ARPANET sent its first message between UCLA and the Stanford Research Institute on 29 October 1969. The two foundational protocols, TCP and IP, were designed by Vinton Cerf and Robert Kahn in the early 1970s and formally adopted by ARPANET on 1 January 1983, sometimes called the Internet's birthday. The Domain Name System (DNS) was introduced in 1984 to map human-readable names like "example.com" to numerical IP addresses. The transition from a US government research network to a global commercial system happened in the early 1990s, after the National Science Foundation's NSFNET backbone was decommissioned in 1995.

      Technically, the Internet works by breaking data into small packets at the source, each labelled with the source and destination IP addresses. Routers — specialised computers at the junctions between networks — read the destination address on each packet and forward it to the next router along a path towards the destination. Packets from a single message can take different routes and arrive out of order; TCP at the destination reassembles them in the right sequence and asks for any missing ones to be retransmitted. Names are translated to addresses by recursive queries through the DNS. The whole system is decentralised: there is no master computer in charge, only a hierarchy of voluntary cooperation between thousands of independent network operators.
  - q: "Who was Vincent van Gogh?"
    a: |-
      Vincent Willem van Gogh (1853-1890) was a Dutch Post-Impressionist painter who is among the most influential figures in the history of Western art. Despite a career as a painter that lasted only about a decade, he produced approximately 2,100 artworks, including around 860 oil paintings, most created in the last two years of his life.

      Van Gogh was born on 30 March 1853 in Zundert in the southern Netherlands, the son of a Dutch Reformed minister. He worked first as an art dealer for the firm Goupil and Cie in The Hague, London, and Paris, then as a lay preacher among coal miners in the Borinage region of Belgium, before deciding around 1880 to become a painter. He was largely self-taught, with periods of formal instruction in Brussels, The Hague, and Antwerp. His early works, such as The Potato Eaters (1885), were dark and earthy, depicting peasants in a sombre realist style.

      In February 1886 he moved to Paris to live with his younger brother Theo, an art dealer, and was exposed to the work of the Impressionists and Japanese woodblock prints. His palette transformed: he adopted the brilliant colours, expressive brushwork, and bold outlines that defined his mature style. He moved to Arles in the south of France in February 1888, where he produced many of his best-known works — including The Yellow House, Cafe Terrace at Night, the Sunflowers series, and Bedroom in Arles — and briefly shared a studio with Paul Gauguin. After a quarrel with Gauguin in December 1888, van Gogh famously cut off part of his own left ear. Severe mental breakdowns followed, and he voluntarily admitted himself to the asylum at Saint-Paul-de-Mausole in Saint-Remy from May 1889 to May 1890, where he painted The Starry Night, Irises, and many other masterpieces. He died on 29 July 1890 in Auvers-sur-Oise after shooting himself two days earlier; he was 37 years old. Almost all of his celebrated paintings were sold or otherwise commercialised only after his death, when his sister-in-law Jo van Gogh-Bonger championed his work.
  - q: "What was the Cold War?"
    a: |-
      The Cold War was a period of geopolitical tension between the United States and the Soviet Union and their respective allies — the Western Bloc and the Eastern Bloc — that lasted, by most accounts, from 1947 to the dissolution of the Soviet Union on 26 December 1991. Although the two superpowers never engaged in direct large-scale combat with each other, they competed through proxy wars, an arms race, propaganda, espionage, economic aid, sport, and a high-stakes contest for technological prestige.

      The conflict's roots lay in the breakdown of the wartime alliance between the Western Allies and the USSR after the defeat of Nazi Germany in 1945. Disputes over the political future of liberated Eastern Europe, encapsulated in Winston Churchill's "Iron Curtain" speech of 5 March 1946 in Fulton, Missouri, hardened into rival blocs. The Truman Doctrine of 1947 committed the United States to "containing" Soviet expansion, while the Marshall Plan of the same year offered around $13 billion (equivalent to roughly $170 billion today) in aid to rebuild Western Europe. NATO was founded in 1949 and the Warsaw Pact in 1955, formalising the military division of the continent.

      Major flashpoints included the Berlin Blockade and Airlift (1948-49), the Korean War (1950-53), the Hungarian Uprising of 1956, the construction of the Berlin Wall (1961), the Cuban Missile Crisis (October 1962, when the world came closest to nuclear war), the Vietnam War (US involvement 1955-1973), the Soviet invasion of Afghanistan (1979-89), and the Solidarity movement in Poland in the 1980s. The space race was a parallel arena: the Soviets launched Sputnik 1 on 4 October 1957 and put Yuri Gagarin into orbit in April 1961, while the United States responded with the Apollo Moon landings in July 1969. Mikhail Gorbachev's reforms in the late 1980s, the peaceful revolutions of 1989, German reunification in 1990, and the abortive Soviet coup of August 1991 brought the Cold War to an end with remarkable speed.
  - q: "What is the human brain?"
    a: |-
      The human brain is the central organ of the nervous system and the most complex known biological structure in the universe. In adults it weighs approximately 1.3-1.4 kilograms, occupies a volume of about 1,260 cubic centimetres in men and around 1,130 cubic centimetres in women, and contains roughly 86 billion neurons (a figure refined downwards from the older estimate of 100 billion by the work of Suzana Herculano-Houzel and colleagues in 2009). Each neuron is connected to thousands of others by synapses, giving an estimated total of around 100 trillion synaptic connections.

      The brain is conventionally divided into three major parts. The cerebrum — the largest part — is split into two hemispheres connected by the corpus callosum, a thick band of about 200 million axons. Its outer layer, the cerebral cortex, is the highly folded grey matter responsible for higher cognitive functions including language, planning, memory, conscious perception, and voluntary movement. The cerebellum, tucked beneath the back of the cerebrum, contains over half of the brain's neurons in only about 10 percent of its volume and is critical for motor coordination, balance, and fine timing. The brainstem connects the brain to the spinal cord and regulates many automatic functions, including heart rate, breathing, and sleep cycles.

      The brain is metabolically expensive: although it constitutes only about 2 percent of body mass in adults, it consumes around 20 percent of the body's resting oxygen and energy. It is sustained by a dedicated blood supply, the circle of Willis, and protected by the skull, three meninges (the dura, arachnoid, and pia mater), and roughly 150 millilitres of cerebrospinal fluid that cushions it and exchanges nutrients and waste. Modern neuroimaging methods, particularly functional MRI (developed in the early 1990s), have allowed scientists to map brain activity non-invasively, while connectomics projects such as the Human Connectome Project (launched in 2009) aim to chart the brain's networks at increasingly fine resolutions.
  - q: "Who was Isaac Newton?"
    a: |-
      Sir Isaac Newton (1643-1727) was an English mathematician, physicist, astronomer, alchemist, and theologian. He is widely recognised as one of the greatest mathematicians and most influential scientists of all time. His Philosophiae Naturalis Principia Mathematica ("Mathematical Principles of Natural Philosophy"), published in three volumes in July 1687, laid the foundations of classical mechanics and is one of the most important works in the history of science.

      Newton was born on 4 January 1643 (Gregorian calendar; 25 December 1642 by the Julian calendar then used in England) at Woolsthorpe Manor in Lincolnshire, several months after the death of his father. He attended Trinity College, Cambridge, where he matriculated in 1661 and graduated in 1665. The plague forced the university to close, and Newton spent much of 1665-67 back at Woolsthorpe in what he later called his "annus mirabilis". During this period he made fundamental advances in calculus, optics, and the theory of gravitation, including the famous (probably partly mythical) episode of the falling apple. He was elected a Fellow of Trinity in 1667 and Lucasian Professor of Mathematics in 1669, a chair later held by Charles Babbage and Stephen Hawking.

      Newton's Principia formulated his three laws of motion and the law of universal gravitation, which together explained Kepler's planetary motion, the tides, and the orbits of comets, and were the dominant scientific framework for the next two centuries. His Opticks (1704) demonstrated that white light is composed of a spectrum of colours, separable by a prism. He invented (independently of Leibniz) what we now call calculus and made significant contributions to the binomial theorem, infinite series, and the theory of equations. Beyond science, Newton served as Warden and then Master of the Royal Mint from 1696, where he aggressively pursued counterfeiters; he was president of the Royal Society from 1703 until his death and was knighted by Queen Anne in 1705. He died on 31 March 1727 (Gregorian) and was buried in Westminster Abbey.
  - q: "What is artificial intelligence?"
    a: |-
      Artificial intelligence (AI) is the field of computer science concerned with creating machines and software systems capable of performing tasks that typically require human intelligence — such as visual perception, speech recognition, decision-making, language translation, and natural-language understanding. The term was coined by the American computer scientist John McCarthy in the proposal for the 1956 Dartmouth Summer Research Project on Artificial Intelligence, which is generally regarded as the field's founding event.

      AI research has gone through several boom-and-bust cycles since the 1950s. Early symbolic AI systems, including programs that proved mathematical theorems and played simple games, were followed by the "expert system" boom of the 1980s — rule-based systems that encoded human expertise in narrow domains such as medical diagnosis. Two "AI winters" of reduced funding (broadly the late 1970s and the late 1980s to early 1990s) followed disappointment with these approaches. The renaissance from the late 2000s onwards has been driven primarily by machine learning, especially deep learning — the use of artificial neural networks with many layers, trained on very large datasets and run on increasingly powerful GPUs.

      Landmark milestones include IBM's Deep Blue defeating the world chess champion Garry Kasparov in May 1997, IBM Watson winning the quiz show Jeopardy! in February 2011, DeepMind's AlphaGo defeating the Go world champion Lee Sedol in March 2016, and the rise of large language models such as OpenAI's GPT series, Anthropic's Claude, and Google's Gemini in the early 2020s. Modern AI systems are increasingly multimodal, processing text, images, audio, and video together. The field has also raised significant societal questions about safety, alignment with human values, employment, misinformation, and concentration of computing power, and has prompted regulatory responses such as the European Union's AI Act, agreed in December 2023 and signed into law in 2024.
  - q: "Who was Wolfgang Amadeus Mozart?"
    a: |-
      Wolfgang Amadeus Mozart (1756-1791) was a prolific and influential composer of the Classical period. Born in Salzburg, then a city-state in the Holy Roman Empire, on 27 January 1756, Mozart showed musical genius from an extraordinarily early age — he composed his first pieces at five and toured the courts of Europe as a child prodigy under the management of his father, the violinist and composer Leopold Mozart. By the age of 13 he had composed his first opera (La finta semplice, 1768).

      Mozart spent his youth shuttling between Salzburg, Vienna, Paris, and London, and held positions at the court of the Prince-Archbishop of Salzburg before quarrelling with his patron Hieronymus von Colloredo and resettling permanently in Vienna in 1781. There he established himself as a freelance pianist and composer, married Constanze Weber in 1782, and entered an extraordinarily creative final decade. His Vienna years saw the composition of the great Da Ponte operas — Le nozze di Figaro (1786), Don Giovanni (1787), and Cosi fan tutte (1790) — as well as the Singspiel Die Entfuhrung aus dem Serail (1782) and Die Zauberflote (1791), the late symphonies (Nos. 39, 40, and 41 "Jupiter", all 1788), the great piano concertos, the Clarinet Concerto in A major K. 622 (1791), and many of his finest chamber works.

      Mozart's catalogue, indexed by the musicologist Ludwig Ritter von Kochel and known by "K." numbers, contains over 600 works, including 41 numbered symphonies, 27 piano concertos, 23 string quartets, and 22 operas. Despite frequent earnings, he and Constanze lived beyond their means, and Mozart was often in debt. He died in Vienna on 5 December 1791, aged just 35, of an illness whose precise cause has been debated ever since (suggestions include rheumatic fever, kidney failure, and trichinosis); his Requiem in D minor K. 626 was left unfinished at his death and was completed posthumously by his pupil Franz Xaver Sussmayr.
  - q: "What is the Pacific Ocean?"
    a: |-
      The Pacific Ocean is the largest and deepest of the world's five oceans, covering an area of approximately 165.25 million square kilometres — more than the entire combined land area of every continent on Earth. It contains roughly half of the world's free-flowing water and stretches roughly 19,800 kilometres from east to west between Indonesia and Colombia and about 15,500 kilometres from north to south between the Bering Strait and the Antarctic coast.

      The ocean was named "Mare Pacificum" — the "peaceful sea" — by the Portuguese explorer Ferdinand Magellan in 1520, who, after the harrowing passage through the strait that now bears his name at the southern tip of South America, encountered unusually calm waters during his crossing. Magellan and his crew were the first Europeans to traverse the ocean, although Spanish conquistador Vasco Nunez de Balboa had been the first European to sight it from the Isthmus of Panama in September 1513.

      The Pacific is studded with tens of thousands of islands, which are usually grouped into Melanesia, Micronesia, and Polynesia. The Mariana Trench in the western Pacific contains the deepest known point on Earth, the Challenger Deep, which lies approximately 10,935 metres below sea level — deeper than Mount Everest is tall. The trench was first sounded by HMS Challenger in 1875 and first reached by humans on 23 January 1960 by the bathyscaphe Trieste, piloted by Jacques Piccard and Don Walsh. The Pacific is also home to the "Ring of Fire", a roughly 40,000-kilometre arc around its rim where most of the world's earthquakes and volcanic eruptions occur, due to subduction of oceanic plates beneath surrounding continental plates. The Pacific contains the Great Barrier Reef off the northeastern coast of Australia — the world's largest coral-reef system, stretching over 2,300 kilometres and visible from space.
  - q: "Who was Queen Elizabeth II?"
    a: |-
      Queen Elizabeth II (1926-2022) was the Queen of the United Kingdom and other Commonwealth realms from 6 February 1952 until her death on 8 September 2022 — a reign of 70 years and 214 days, the longest of any British monarch and the second-longest verified reign of any sovereign in history, after that of Louis XIV of France.

      Born Elizabeth Alexandra Mary Windsor in London on 21 April 1926, she was the elder daughter of Prince Albert, Duke of York (later King George VI), and Lady Elizabeth Bowes-Lyon. She was not originally expected to inherit the throne; her path to it began with the abdication of her uncle Edward VIII on 11 December 1936 to marry the divorced American socialite Wallis Simpson, which made her father king and her the heir presumptive at the age of ten. During the Second World War she joined the Auxiliary Territorial Service in February 1945 as a 19-year-old, training as a driver and mechanic. She married her third cousin Philip Mountbatten on 20 November 1947 at Westminster Abbey; he was created Duke of Edinburgh on the same day.

      Elizabeth ascended the throne while she and Philip were in Kenya at the news of her father's death on 6 February 1952, and was crowned at Westminster Abbey on 2 June 1953 in the first British coronation to be televised. Her reign witnessed enormous global change: the dismantling of the British Empire, with most colonies achieving independence; 15 different British prime ministers from Winston Churchill to Liz Truss; and the evolution of the Commonwealth into a voluntary association of 56 member states. She and Prince Philip had four children — Charles, Anne, Andrew, and Edward — and she became great-grandmother to multiple grandchildren during her lifetime. She died at Balmoral Castle in Scotland on 8 September 2022 at the age of 96 and was buried at St George's Chapel, Windsor; she was succeeded by her eldest son, who became King Charles III.
  - q: "What is quantum mechanics?"
    a: |-
      Quantum mechanics is the fundamental theory in physics that describes the behaviour of matter and energy at the atomic and subatomic scales. It was developed in the first three decades of the 20th century to explain experimental phenomena that classical (Newtonian) physics could not, including blackbody radiation, the photoelectric effect, atomic spectra, and the stability of atoms.

      Key milestones in its development include Max Planck's 1900 quantum hypothesis to explain blackbody radiation, Albert Einstein's 1905 explanation of the photoelectric effect using light quanta, Niels Bohr's 1913 model of the hydrogen atom with quantised electron orbits, Louis de Broglie's 1924 hypothesis that matter has wave-like properties, and the formulation of full quantum mechanics in 1925-26 by Werner Heisenberg (matrix mechanics) and Erwin Schrodinger (wave mechanics), later shown to be mathematically equivalent. Heisenberg's uncertainty principle, published in 1927, established that pairs of complementary observables — most famously position and momentum — cannot both be measured to arbitrary precision: the product of their uncertainties is bounded below by Planck's constant divided by 4 pi.

      Quantum mechanics replaces the deterministic trajectories of classical physics with probabilistic predictions encoded in a complex-valued wavefunction, whose absolute square gives the probability of finding a particle in a given state. The theory has produced some of the most counter-intuitive ideas in science: superposition (a system can be in multiple states at once), entanglement (correlations between particles that cannot be explained by any local hidden-variable theory, as confirmed by experimental tests of Bell's inequality from the 1970s onwards), and the measurement problem (the apparent collapse of the wavefunction on observation). Despite a century of debate over its interpretation — the Copenhagen interpretation, the many-worlds interpretation of Hugh Everett (1957), pilot-wave theory, and others — quantum mechanics has been the most thoroughly tested theory in the history of physics and underpins technologies including semiconductors, lasers, MRI scanners, and the rapidly developing field of quantum computing.
  - q: "Who painted the Sistine Chapel ceiling?"
    a: |-
      The frescoes on the ceiling of the Sistine Chapel in Vatican City were painted by the Italian Renaissance master Michelangelo Buonarroti (1475-1564) between 1508 and 1512. The commission came from Pope Julius II, the so-called "Warrior Pope", who in 1505 had also commissioned Michelangelo to design his colossal tomb. The ceiling project was originally intended to be a relatively modest depiction of the twelve apostles, but Michelangelo persuaded the Pope to allow him a far more ambitious scheme.

      The result is a vast and complex painted architecture spanning approximately 12,000 square feet (about 1,100 square metres). The central spine of the ceiling shows nine scenes from the Book of Genesis, beginning at the altar end with God's separation of light from darkness and proceeding through the Creation, the Garden of Eden, and the story of Noah. The most famous of these panels is The Creation of Adam, in which God reaches out to touch a languid Adam's outstretched hand. Around these central scenes, Michelangelo painted seated figures of seven Old Testament prophets and five classical sibyls, dozens of nude athletic male figures known as the ignudi, and small narrative scenes in the corner spandrels and lunettes.

      Michelangelo, who considered himself primarily a sculptor, undertook the work reluctantly. He famously dismissed his assistants and completed most of the painting himself, working from scaffolding suspended from holes in the wall (not, as legend has it, while lying on his back). The toll on his neck and eyes is documented in a self-deprecating sonnet he wrote at the time. He returned to the chapel decades later, in 1535-1541, to paint the enormous fresco of The Last Judgement on the altar wall, also commissioned by a pope (Paul III). The Sistine Chapel ceiling underwent a major and controversial restoration between 1980 and 1994, which removed centuries of soot and overpainting and revealed the brilliantly bright colours that had been Michelangelo's original palette.
  - q: "What was World War I?"
    a: |-
      World War I, also called the Great War, was a global conflict that lasted from 28 July 1914 until 11 November 1918. It was one of the deadliest wars in history, with an estimated 8.5 to 10 million combatant deaths and at least 13 million civilian deaths, and it reshaped the political map of Europe and the Middle East. It is conventionally said to have been triggered by the assassination on 28 June 1914 of Archduke Franz Ferdinand of Austria-Hungary by the Bosnian Serb nationalist Gavrilo Princip in Sarajevo.

      The deeper causes lay in a tangle of European alliances and rivalries: the Triple Entente of France, Russia, and Britain on one side, and the Triple Alliance of Germany, Austria-Hungary, and Italy (which switched sides in 1915) on the other; intense imperial competition; a costly naval arms race between Britain and Germany; the unresolved consequences of the 1870-71 Franco-Prussian War; and unstable nationalism in the Balkans, exemplified by the two Balkan Wars of 1912-13. Austria-Hungary's ultimatum to Serbia, mobilisation by Russia, and Germany's invocation of the Schlieffen Plan to attack France through neutral Belgium converted the assassination into a continental and then global war within five weeks.

      The Western Front, stretching from the North Sea to Switzerland, settled into a brutal stalemate of trench warfare after the failed German advance was halted at the Battle of the Marne in September 1914. Major battles like the Somme (1916, with around 1.2 million casualties) and Verdun (1916) produced staggering losses for marginal gains. New technologies — machine guns, poison gas (first used at scale by Germany at Ypres in April 1915), tanks (introduced by Britain at the Somme in September 1916), and aircraft — added to the carnage. The conflict's other theatres included the Eastern Front, Gallipoli, the Middle East, the African colonies, and the war at sea. The United States entered on the Allied side in April 1917, partly in response to unrestricted submarine warfare and the Zimmermann Telegram. Russia withdrew after the Bolshevik Revolution of November 1917 and the Treaty of Brest-Litovsk in March 1918. The war ended with the Armistice of Compiegne at 11:00 on 11 November 1918 and was formally concluded by the Treaty of Versailles, signed on 28 June 1919.
  - q: "What is the Amazon rainforest?"
    a: |-
      The Amazon rainforest is the world's largest tropical rainforest, covering approximately 5.5 million square kilometres of the Amazon basin in South America — an area roughly twice the size of India, or about half the size of the United States. It spans nine countries, with about 60 percent of the forest in Brazil, 13 percent in Peru, 10 percent in Colombia, and smaller portions in Bolivia, Ecuador, French Guiana, Guyana, Suriname, and Venezuela. It is sometimes called the "lungs of the planet", although this label is somewhat misleading because the forest's net contribution of oxygen to the atmosphere is small compared to that from oceanic phytoplankton.

      The forest's biodiversity is extraordinary: it contains an estimated 16,000 tree species, around 2.5 million insect species, more than 2,500 fish species, over 1,500 bird species, and around 430 mammal species. A single hectare of the Amazon may contain more than 750 different tree species — more than the entire native flora of the United Kingdom. Charismatic species include the jaguar, harpy eagle, three-toed sloth, pink river dolphin, and giant otter. The forest is also home to several hundred indigenous peoples, including the Yanomami, Kayapo, Tikuna, and several uncontacted groups, who together speak roughly 250 languages.

      The Amazon plays a critical role in the global climate system. It is estimated to store somewhere between 80 and 120 billion tonnes of carbon in its biomass and soils, and influences regional rainfall patterns through evapotranspiration: about half the rain in the basin is recycled by the trees themselves, sustaining "flying rivers" of moisture that feed agriculture as far away as southern Brazil and Argentina. Deforestation, driven primarily by clearance for cattle ranching and soybean production, accelerated in the 1970s. Brazil's National Institute for Space Research (INPE) has tracked the loss using satellites since 1988; cumulative deforestation has now claimed roughly 17 to 20 percent of the original forest, and scientists warn of a potential "tipping point" beyond which the rainforest could begin to dry out and transition to savanna, particularly in the southeastern Amazon.
  - q: "Who was Steve Jobs?"
    a: |-
      Steven Paul Jobs (1955-2011) was an American business magnate, inventor, and the co-founder, chief executive, and chairman of Apple Inc. He is widely credited with revolutionising six different industries — personal computing, animated films, music, phones, tablet computing, and digital publishing — and is one of the most influential figures of the late 20th and early 21st centuries.

      Jobs was born in San Francisco on 24 February 1955 and adopted by Paul and Clara Jobs of Mountain View, California. He briefly attended Reed College in Oregon before dropping out, working at Atari, and travelling to India in search of spiritual enlightenment. In 1976, he co-founded Apple Computer with his friend Steve Wozniak in the Jobs family garage. Their first commercial product, the Apple I, was followed by the Apple II in 1977, which became one of the most successful early personal computers. The Macintosh, launched in January 1984 with the iconic Super Bowl advertisement directed by Ridley Scott, popularised the graphical user interface and the mouse for ordinary consumers. Internal disputes led the Apple board to oust Jobs in 1985.

      In the wilderness years between 1985 and 1997, Jobs founded NeXT Computer, a workstation maker, and bought the Graphics Group from Lucasfilm, renaming it Pixar Animation Studios. Pixar's Toy Story (1995) was the first feature-length computer-animated film and a smash hit. Apple acquired NeXT in late 1996, bringing Jobs back as interim CEO; he was made permanent CEO in 2000. Under his second tenure, Apple released the iMac (1998), iPod (October 2001), iTunes Store (2003), iPhone (June 2007), and iPad (April 2010), transforming the company into the most valuable on Earth. Jobs was diagnosed with a rare form of pancreatic cancer in 2003 and underwent a liver transplant in 2009. He resigned as CEO in August 2011 and died on 5 October 2011, aged 56, at his home in Palo Alto, California.
  - q: "What is the Eiffel Tower?"
    a: |-
      The Eiffel Tower (in French, La Tour Eiffel) is a wrought-iron lattice tower on the Champ de Mars in Paris, France, named after the engineer Gustave Eiffel, whose company designed and built it. It was completed in 1889 as the centrepiece of the Exposition Universelle of that year, held to mark the 100th anniversary of the storming of the Bastille at the start of the French Revolution.

      The tower stands 330 metres tall to the tip of its broadcasting antennas (its original 1889 height was 312 metres; an antenna added in 1957 brought it to 320.75 metres, and further modifications have raised it to its present height). At the time of its construction it became the tallest man-made structure in the world, surpassing the Washington Monument, and it held that record until the Chrysler Building in New York was completed in 1930. The structure consists of 18,038 wrought-iron pieces held together by approximately 2.5 million rivets, weighs around 7,300 tonnes (10,100 tonnes including non-metal parts), and was assembled in just over two years by a workforce that peaked at about 250 people. Construction began on 28 January 1887 and finished on 31 March 1889.

      The tower was originally intended to stand for only 20 years and to be dismantled in 1909. It was saved because of its value as a radiotelegraph station; from 1903 it broadcast military signals, and during the First World War it intercepted communications that helped capture the German spy Mata Hari. It is now repainted with around 60 tonnes of paint roughly every seven years to protect against rust. The tower has three accessible levels, two reached by lifts and one (the second floor) also reachable by 674 steps from the ground. It receives roughly 6 to 7 million visitors a year, making it one of the most-visited paid monuments in the world. Its operating company is Societe d'Exploitation de la Tour Eiffel (SETE), majority-owned by the City of Paris.
  - q: "Who was Pythagoras?"
    a: |-
      Pythagoras of Samos (c. 570 - c. 495 BCE) was an ancient Greek philosopher, mathematician, and the eponymous founder of the Pythagorean school of thought, a religious and philosophical movement that became influential in the Greek-speaking world during the late 6th and 5th centuries BCE. Almost nothing of his own writing survives — and indeed it is unclear whether he wrote anything at all — so most of what is known about him comes from later sources, often centuries after his death.

      Born on the Greek island of Samos in the eastern Aegean Sea, Pythagoras is said to have travelled extensively in Egypt, Babylon, and possibly Persia and India, absorbing mathematical and religious knowledge from each. Around 530 BCE he settled in the Greek colony of Croton in southern Italy and founded a community that combined religious devotion, ethical training, communal living, and mathematical study. The community was bound by strict rules, including (according to some accounts) vegetarianism, abstention from beans, and a multi-year period of silence for new initiates.

      The mathematical theorem that bears his name — that in a right-angled triangle the square of the hypotenuse equals the sum of the squares of the other two sides — was actually known to Babylonian and Indian mathematicians long before Pythagoras, but the Pythagoreans are credited with providing the first general proof. Their broader programme was the conviction that "all things are number": that whole numbers and their ratios underlie the structure of reality, an insight reinforced by their discovery of the numerical ratios behind musical harmony. The discovery that the diagonal of a unit square is incommensurable with its side (effectively the irrationality of the square root of 2), traditionally attributed to a Pythagorean named Hippasus, is supposed to have caused something of a crisis in the school. Pythagoras's exact date and place of death are uncertain; he probably died in Metapontum after political unrest forced his community out of Croton.
  - q: "What is the United Nations?"
    a: |-
      The United Nations (UN) is an intergovernmental organisation established on 24 October 1945, after the Second World War, with the stated aim of preventing future wars, fostering international cooperation, promoting human rights, and addressing global problems such as poverty, disease, and climate change. Its headquarters is on a 17-acre site overlooking the East River in Manhattan, New York City, on land that is technically international territory. The organisation has 193 member states, comprising every widely recognised sovereign nation in the world; non-member states include Vatican City and Palestine, both of which hold permanent observer status.

      The UN was founded by 51 original member states, who signed the United Nations Charter in San Francisco on 26 June 1945. It replaced the largely ineffectual League of Nations, established after the First World War. Its principal organs are the General Assembly (in which every member state has one vote), the Security Council (with five permanent members holding veto power — the United States, the United Kingdom, France, Russia, and China — plus ten rotating members), the Economic and Social Council, the International Court of Justice in The Hague, the Trusteeship Council (suspended since 1994), and the Secretariat, headed by a Secretary-General appointed for renewable five-year terms. The current Secretary-General is Antonio Guterres of Portugal, who took office on 1 January 2017 and was reappointed in 2022.

      The UN system also includes a constellation of specialised agencies, funds, and programmes such as the World Health Organization (WHO), UNESCO, UNICEF, the World Food Programme (WFP), the United Nations High Commissioner for Refugees (UNHCR), and the International Atomic Energy Agency (IAEA). The UN administers around a dozen ongoing peacekeeping missions, with roughly 70,000 personnel deployed worldwide, and provides humanitarian assistance to tens of millions of people every year. It has been awarded the Nobel Peace Prize multiple times, both as an institution (in 2001, jointly with Kofi Annan) and through its agencies. The Universal Declaration of Human Rights, drafted under Eleanor Roosevelt and adopted on 10 December 1948, remains one of its most influential documents.
  - q: "Who wrote The Lord of the Rings?"
    a: |-
      The Lord of the Rings was written by the English philologist and academic J. R. R. Tolkien — John Ronald Reuel Tolkien (1892-1973) — and published by Allen and Unwin in three volumes between July 1954 and October 1955. It is a single sequel to his earlier children's novel The Hobbit (1937), although the publisher chose to issue it in three parts (The Fellowship of the Ring, The Two Towers, and The Return of the King) for commercial reasons.

      Tolkien was born in Bloemfontein in the Orange Free State (in present-day South Africa) on 3 January 1892 and moved to England as a small child. He served in the British Army during the First World War, fighting in the Battle of the Somme in 1916 before being invalided home with trench fever. Many friends, including most members of his Birmingham school's literary club, the T.C.B.S., were killed; their loss is widely seen as a formative influence on his work. After the war he became a renowned scholar of Old and Middle English, holding the Rawlinson and Bosworth Professorship of Anglo-Saxon at Oxford from 1925 to 1945 and the Merton Professorship of English Language and Literature from 1945 to 1959. His scholarly publications include a groundbreaking 1936 lecture on Beowulf that transformed how the poem is read.

      The Lord of the Rings took Tolkien more than a decade to write, from 1937 to 1949. Set in his invented world of Middle-earth, it follows the hobbit Frodo Baggins on a quest to destroy the One Ring of the Dark Lord Sauron in the fires of Mount Doom. The novel's success grew gradually, but was vastly amplified by an unauthorised paperback edition published by Ace Books in 1965 that helped make the book a counter-cultural sensation in the United States. Tolkien also wrote, but did not finish, an enormous body of background mythology that his son Christopher edited and published posthumously as The Silmarillion (1977) and many subsequent volumes. Peter Jackson's three live-action film adaptations (released between 2001 and 2003) won 17 Academy Awards in total, including 11 for The Return of the King in 2004 — equalling the record held by Ben-Hur and Titanic.
  - q: "What is photosynthesis's role in the carbon cycle?"
    a: |-
      Photosynthesis is the central biological process driving the global carbon cycle, the constant exchange of carbon between the atmosphere, oceans, land, and living organisms. By converting atmospheric carbon dioxide and water into carbohydrates and molecular oxygen, photosynthetic organisms — terrestrial plants, marine algae, and cyanobacteria — pull carbon out of the air and lock it temporarily in biomass, soils, and ocean ecosystems. Globally, photosynthesis is estimated to fix between 100 and 120 billion tonnes of carbon a year, almost half of which is performed by phytoplankton in the surface waters of the oceans.

      Most of this carbon is rapidly returned to the atmosphere through respiration, decomposition, and forest fires, in a series of fluxes that closely balance over short timescales. A small fraction, however, is buried in sediments — for instance in peatlands, in the deep ocean, or as the dead remains of marine organisms — and over geological timescales becomes coal, oil, natural gas, and limestone. Without this slow burial, all atmospheric CO2 would have been depleted by photosynthesis hundreds of millions of years ago.

      The carbon cycle has been substantially perturbed by humans since the Industrial Revolution. Burning fossil fuels and changes in land use (mainly deforestation) currently inject roughly 11 billion tonnes of carbon into the atmosphere each year. About a quarter of this excess is absorbed by the oceans (causing ocean acidification, with surface pH having dropped by about 0.1 units since 1850), and about another quarter is taken up by terrestrial ecosystems (which is why the strength of the global "land carbon sink" depends sensitively on the future of forests like the Amazon and the boreal taiga). The remaining half stays in the atmosphere, accumulating as the increase in CO2 concentration from about 280 ppm before 1750 to over 420 ppm in 2024. Strengthening or stabilising natural carbon sinks — through afforestation, soil management, peatland restoration, and protection of marine ecosystems — is an important component of any plausible plan for limiting climate change.
  - q: "What is the Sahara desert?"
    a: |-
      The Sahara is the world's largest hot desert, covering an area of approximately 9.2 million square kilometres in North Africa — almost as large as the contiguous United States or China. It stretches across 11 modern countries, including Algeria, Chad, Egypt, Libya, Mali, Mauritania, Morocco, Niger, Sudan, Tunisia, and Western Sahara, and runs from the Atlantic Ocean in the west to the Red Sea in the east, and from the Atlas Mountains and Mediterranean coast in the north to the Sahel grasslands in the south.

      Despite popular images of endless dunes, sand seas (or "ergs") cover only about 25 percent of the Sahara's area. The rest is composed of stony plains called regs (about 70 percent), rocky plateaus called hamadas, salt flats, ephemeral riverbeds called wadis, and oases. The desert's highest point is Emi Koussi, an extinct volcano in the Tibesti Mountains of northern Chad rising to 3,415 metres, and its lowest point is the Qattara Depression in Egypt at 133 metres below sea level. Daytime summer temperatures regularly exceed 45 degrees Celsius, while winter nights in the central highlands can drop below freezing. The world's highest reliably recorded shade temperature, 56.7 degrees Celsius, was measured at Furnace Creek in Death Valley, but several Saharan stations have come close.

      The Sahara has not always been so dry. Palaeoclimatological evidence — including ancient lake beds, fossil river systems visible from satellite, and rock paintings of cattle, hippos, and giraffes in the Tassili n'Ajjer plateau in Algeria — shows that during the African Humid Period roughly 11,000 to 5,000 years ago, much of the central Sahara was covered by savanna and seasonal lakes, with substantial human populations. The desert is currently expanding southwards into the Sahel at a slow rate; the African Union's "Great Green Wall" initiative, launched in 2007, aims to plant a band of vegetation roughly 8,000 kilometres long and 15 kilometres wide across the southern margin to halt this trend.
  - q: "Who was Aristotle?"
    a: |-
      Aristotle (384-322 BCE) was a Greek philosopher and polymath whose writings cover a remarkable range of subjects — including physics, biology, zoology, metaphysics, logic, ethics, aesthetics, poetry, theatre, music, rhetoric, psychology, linguistics, economics, politics, meteorology, and government. Together with his teacher Plato and Plato's teacher Socrates, he is one of the founding figures of Western philosophy, and his work shaped intellectual life in Europe and the Islamic world for nearly two millennia.

      Aristotle was born in Stagira on the northern coast of Greece in 384 BCE, the son of Nicomachus, the personal physician to the king of Macedon. He moved to Athens at the age of 17 to study at Plato's Academy, where he remained for some 20 years, until Plato's death in 347 BCE. He then spent time in Asia Minor and at the court of King Philip II of Macedon, where he tutored the young Alexander the Great from about 343 to 340 BCE. Around 335 BCE he returned to Athens and founded his own school, the Lyceum, where his pattern of walking up and down while teaching gave his followers the name "Peripatetics" (from Greek peripatein, "to walk about").

      Aristotle developed the formal study of logic, particularly the syllogism. His treatise on biology cataloged hundreds of species, including detailed observations of marine life around the island of Lesbos that were not surpassed until the 19th century. His Nicomachean Ethics articulated a theory of virtue ethics centred on eudaimonia (flourishing) and the doctrine of the golden mean. His Politics analysed forms of government and is one of the foundational texts of political theory. His Poetics inaugurated literary criticism in the West, defining tragedy as the imitation of an action that effects catharsis through pity and fear. After Alexander's death in 323 BCE, anti-Macedonian sentiment in Athens forced Aristotle to flee to Chalcis on the island of Euboea, where he died of natural causes the following year, in 322 BCE, at the age of 62.
  - q: "What is the speed of sound?"
    a: |-
      The speed of sound is the rate at which sound waves propagate through a medium. It depends strongly on the medium's density and elasticity, and on temperature. In dry air at sea level and 20 degrees Celsius, the speed of sound is approximately 343 metres per second, equivalent to about 1,235 kilometres per hour or 767 miles per hour. This is famously much slower than the speed of light, which is why we see lightning before we hear the thunder.

      The temperature dependence is significant in air: the speed of sound rises by roughly 0.6 metres per second for every 1 degree Celsius increase in temperature. The relevant formula derived from the kinetic theory of gases is approximately v = 331.3 + 0.606 * T m/s, where T is the temperature in degrees Celsius. Humidity has a small additional effect (sound travels slightly faster in moist air than in dry air at the same temperature), and pressure has essentially no effect for an ideal gas. In other media, the speed of sound is generally much greater: about 1,480 metres per second in water at 20 degrees Celsius, around 5,100 metres per second in steel, and roughly 12,000 metres per second in diamond.

      The first attempts to measure the speed of sound were conducted by the Italian polymath Marin Mersenne in the early 17th century, who used the time delay between seeing a cannon flash and hearing its report. The 18th-century French Academy of Sciences refined the technique using cannons fired at known distances, obtaining values close to the modern figure. The threshold for objects moving at the speed of sound — the "sound barrier" — was first deliberately broken in level flight on 14 October 1947 by US Air Force test pilot Chuck Yeager, flying the Bell X-1 aircraft Glamorous Glennis at Mach 1.06 over the Mojave Desert in California. The ratio of an object's speed to the local speed of sound is called the Mach number, after the Austrian physicist Ernst Mach.
  - q: "Who was Genghis Khan?"
    a: |-
      Genghis Khan (c. 1162-1227) — born Temujin — was the founder and first Great Khan of the Mongol Empire, which after his death became the largest contiguous land empire in history, ultimately covering an estimated 24 million square kilometres of Asia and Europe at its peak under his grandson Kublai Khan. He is one of the most consequential, and one of the most controversial, figures in world history.

      Temujin was born around 1162 on the steppes of present-day Mongolia, the son of a Borjigin chieftain who was poisoned by rival Tatars when Temujin was about nine years old. His widowed mother and her children were abandoned by their tribe and survived in extreme hardship. Through a combination of military skill, political acumen, and strategic alliances, Temujin gradually unified the warring Mongol tribes. He was proclaimed "Genghis Khan" — usually translated as "Universal Ruler" — at a kurultai (assembly of chieftains) on the banks of the Onon River in 1206.

      He then launched a series of devastating military campaigns. His armies, organised in disciplined units of ten, a hundred, a thousand, and ten thousand (tumens), and built around superbly trained mounted archers, conquered the Western Xia, the Jin Dynasty in northern China, and most catastrophically the Khwarezmian Empire in Central Asia and Persia between 1219 and 1221. Cities that resisted, such as Bukhara, Samarkand, and Nishapur, were systematically destroyed and their populations massacred; some historians estimate the population of Persia and Central Asia did not return to pre-invasion levels for centuries. Genghis Khan also instituted the Yassa, a code of laws governing his domain; promoted religious tolerance among his subjects; supported a written script for Mongolian; and protected the Silk Road, leading to a long period of trans-Eurasian commerce known as the Pax Mongolica. He died on 25 August 1227 during a campaign against the Western Xia. The site of his tomb has never been found, in keeping with Mongol custom.
  - q: "What is dark matter?"
    a: |-
      Dark matter is a hypothetical form of matter that does not emit, absorb, or reflect electromagnetic radiation, making it effectively invisible to telescopes. Its existence is inferred from a wide range of gravitational effects on visible matter, on the cosmic microwave background, and on the large-scale structure of the universe. According to the standard cosmological model, dark matter accounts for about 27 percent of the total mass-energy of the universe — roughly five times the contribution of ordinary baryonic matter (the protons, neutrons, and electrons of which stars, planets, and people are made), which is only about 5 percent. The remaining roughly 68 percent is dark energy.

      The first hint of dark matter came in 1933, when the Swiss astronomer Fritz Zwicky studied the velocities of galaxies in the Coma Cluster and found that the visible mass was far too small to gravitationally bind the cluster — he hypothesised the existence of "dunkle Materie". The case became compelling in the 1970s with the work of the American astronomers Vera Rubin and Kent Ford, whose detailed measurements of the rotation curves of spiral galaxies showed that stars at the outskirts move much faster than expected from the visible matter alone, implying that each galaxy is embedded in an extended halo of unseen matter. Subsequent evidence has come from gravitational lensing — the bending of light from background objects by foreground mass — observed in cluster collisions like the Bullet Cluster (2006), where the lensing peak is offset from the visible gas, providing a particularly clear demonstration.

      Despite decades of effort, the particle nature of dark matter remains unknown. Leading candidates include weakly interacting massive particles (WIMPs), axions (hypothetical light bosons originally proposed in the 1970s to solve a different problem in particle physics), sterile neutrinos, and primordial black holes. Direct-detection experiments such as XENONnT in Italy, LUX-ZEPLIN in South Dakota, and PandaX in China search for the rare scattering of dark-matter particles off ordinary atomic nuclei in deep underground detectors. Indirect detection looks for the products of dark-matter annihilation in the Galaxy, and the Large Hadron Collider searches for missing-energy signatures of dark-matter production in proton-proton collisions. So far, no detection has been confirmed.
  - q: "Who was Joan of Arc?"
    a: |-
      Joan of Arc (c. 1412-1431), known in French as Jeanne d'Arc and "La Pucelle d'Orleans" (the Maid of Orleans), was a French peasant girl who became a national heroine and patron saint of France. Believing herself to be acting under divine guidance, she led the French army to several important victories during the Hundred Years' War with England before being captured, tried for heresy, and burnt at the stake at the age of about nineteen.

      Joan was born around 1412 in the village of Domremy in northeastern France, the daughter of a tenant farmer. From the age of about 13 she reported hearing voices that she identified as Saints Michael, Catherine, and Margaret, urging her to drive the English from French soil and ensure the coronation of the Dauphin Charles. In 1429 — the war had been going on, intermittently, since 1337 — she persuaded a local commander to send her to Charles at his court in Chinon. After examination by churchmen at Poitiers, she was given armour, a horse, and a small force, and dispatched to relieve the besieged city of Orleans. The siege was lifted on 8 May 1429, and a series of further victories cleared the route for Charles to be crowned King Charles VII at Reims Cathedral on 17 July 1429.

      Joan was wounded during a failed assault on Paris in September 1429 and captured by Burgundian forces (allied with the English) at Compiegne on 23 May 1430. After being sold to the English, she was put on trial in Rouen in early 1431 by a politically motivated ecclesiastical court led by Bishop Pierre Cauchon. Charged with multiple offences including heresy and dressing as a man, she was convicted and burnt at the stake in the Old Market Square of Rouen on 30 May 1431. Twenty-five years later, in 1456, a posthumous retrial ordered by Pope Callixtus III declared her innocent and a martyr. She was canonised by Pope Benedict XV on 16 May 1920 and remains one of the most enduring symbols of France.
  - q: "What was the Industrial Revolution?"
    a: |-
      The Industrial Revolution was the transition to new manufacturing processes in Great Britain, continental Europe, and the United States, occurring roughly between 1760 and 1840 in its first phase and continuing through the 19th century in successive waves. It transformed largely agrarian, rural societies into industrial and urban ones, raised average living standards over the long term, and fundamentally altered virtually every aspect of human life from work and travel to demography and politics.

      The first Industrial Revolution began in Britain, for reasons that historians continue to debate but which include cheap and abundant coal, a literate and mobile workforce, secure property rights, expanding global trade, and a wave of mechanical inventions. Key inventions included the flying shuttle by John Kay (1733), the spinning jenny by James Hargreaves (1764), Richard Arkwright's water frame (1769), James Watt's improvements to the steam engine (patented 1769), and Edmund Cartwright's power loom (1785). Cotton textiles, iron production, and the steam engine were the leading sectors. The world's first commercially successful steam-powered passenger railway, the Liverpool and Manchester Railway, opened on 15 September 1830.

      The second Industrial Revolution, from roughly the 1870s to 1914, was driven by steel (the Bessemer process was patented in 1856), electricity (Edison's incandescent lamp in 1879, Tesla and Westinghouse's alternating-current systems in the 1880s), the internal combustion engine (Karl Benz's three-wheeled motorwagen of 1885), the chemical industry, and the telegraph and telephone. It was concentrated in Germany and the United States as much as in Britain. The Industrial Revolution lifted unprecedented numbers out of subsistence poverty but also produced grim factory conditions, child labour, urban overcrowding, and environmental damage; it inspired political responses including factory legislation, the early labour movement, and the works of Karl Marx and Friedrich Engels, whose Communist Manifesto was published in 1848. By 1900, the share of the world economy controlled by the industrialised nations had grown enormously, setting the stage for the geopolitics of the 20th century.
  - q: "Who is the current Pope?"
    a: |-
      Pope Francis is the 266th Bishop of Rome and head of the Catholic Church, having been elected on 13 March 2013 following the resignation of his predecessor Pope Benedict XVI in February 2013 — the first papal resignation in nearly 600 years, since Gregory XII in 1415.

      Born Jorge Mario Bergoglio on 17 December 1936 in Buenos Aires, Argentina, he was the eldest of five children of Italian immigrants from the Piedmont region. Trained originally as a chemical technician, he entered the Society of Jesus (the Jesuits) in 1958 and was ordained a priest on 13 December 1969. He served as the Provincial Superior of the Society of Jesus in Argentina from 1973 to 1979, taught literature, psychology, and theology, and was made Auxiliary Bishop of Buenos Aires in 1992 and Archbishop in 1998. He was elevated to the College of Cardinals by Pope John Paul II in 2001.

      As pope, Francis is notable for several "firsts": he is the first Jesuit pope, the first pope from the Americas, the first from the Southern Hemisphere, and the first non-European pope since the Syrian Gregory III in the 8th century. He chose the regnal name Francis in honour of Saint Francis of Assisi, signalling a focus on the poor, simplicity, and care for creation. His major encyclicals include Laudato si' (2015) on environmental stewardship and climate change, and Fratelli tutti (2020) on social fraternity. He has also pushed administrative reforms of the Roman Curia, presided over major synods on the family (2014-15) and on synodality itself (2021-24), and convened summits on the safeguarding of minors. As of 2024 he is in his late 80s and his health has been an active subject of public discussion.
  - q: "What is the Sun?"
    a: |-
      The Sun is the star at the centre of the Solar System and by far the most massive object in it, accounting for approximately 99.86 percent of the total mass of the system. It is a roughly spherical ball of hot plasma — about 73 percent hydrogen and 25 percent helium by mass, with traces of heavier elements — held together by its own gravity and powered by thermonuclear fusion in its core. By stellar classification it is a G2V main-sequence star, often loosely called a "yellow dwarf", although it actually appears white when viewed from outside Earth's atmosphere.

      The Sun has a diameter of about 1.39 million kilometres — roughly 109 times that of Earth — and a mass of about 1.989 x 10^30 kilograms, equivalent to about 333,000 Earth masses. Its mean distance from Earth is about 149.6 million kilometres, a distance defined as one astronomical unit (AU). At its core, where temperatures reach about 15.7 million kelvins and pressures around 250 billion atmospheres, hydrogen nuclei fuse into helium via the proton-proton chain, releasing energy at a rate of about 3.846 x 10^26 watts — equivalent to detonating around 90 billion megatonnes of TNT every second. The energy escapes outwards through a radiative zone (taking on average about 100,000 to 200,000 years to traverse), then a convective zone, before being released as light from the photosphere at an effective temperature of about 5,778 kelvins.

      Above the photosphere lies the chromosphere and then the corona, the outermost atmosphere of the Sun, which paradoxically reaches temperatures of millions of kelvins — a long-standing puzzle now thought to be solved by magnetic-wave heating. The Sun rotates differentially, with its equator turning once every 25 days and its polar regions every 35 days; this differential rotation generates a complex magnetic field whose 11-year cycle of solar activity drives sunspots, flares, and coronal mass ejections. Formed about 4.6 billion years ago from the gravitational collapse of a giant molecular cloud, the Sun has consumed roughly half its hydrogen fuel and is expected to leave the main sequence in around 5 billion years, expanding into a red giant before shedding its outer layers as a planetary nebula and leaving behind a white dwarf core.
  - q: "Who was Florence Nightingale?"
    a: |-
      Florence Nightingale (1820-1910) was an English social reformer and statistician, often regarded as the founder of modern nursing. Through her work organising care for British and allied soldiers during the Crimean War (1853-1856) and her later campaigns for sanitary reform, she transformed the practice of nursing into a respected, professional, and statistically informed discipline.

      Born to a wealthy upper-class British family on 12 May 1820 in Florence, Italy (after which she was named), Nightingale was educated at home in mathematics, languages, and the classics by her father. She announced in 1844 that she intended to become a nurse — at the time a low-status occupation widely associated with poor working conditions and intemperance — over the strong objections of her family. She trained at the Lutheran Institute of Deaconesses at Kaiserswerth in Germany in 1851 and was appointed superintendent of the Institute for the Care of Sick Gentlewomen in London in 1853.

      In October 1854, after newspaper reports exposed the appalling conditions in British military hospitals during the Crimean War, the Secretary of State for War, Sidney Herbert, asked Nightingale to lead a team of 38 nurses to the army hospital at Scutari (modern Uskudar, Istanbul). The conditions she found were catastrophic: overcrowding, lack of basic supplies, contaminated water, and a death rate among wounded soldiers of around 42 percent. Through tireless administrative work and reforms — improved sanitation, ventilation, kitchens, and laundries — the death rate fell to around 2 percent. Her habit of walking the wards by lamplight gave her the nickname "the Lady with the Lamp". After returning to England, she used careful statistical analysis (including her famous "polar area" rose diagrams) to lobby successfully for the reform of military medicine and public health. In 1860 she founded the Nightingale Training School for Nurses at St Thomas's Hospital in London, the first secular nursing school in the world. She became the first woman elected to the Royal Statistical Society in 1859 and was awarded the Order of Merit in 1907. She died in London on 13 August 1910 at the age of 90.
  - q: "What is the FIFA World Cup?"
    a: |-
      The FIFA World Cup is the international association football tournament for the senior men's national teams of the members of FIFA (the Federation Internationale de Football Association). First held in 1930, it is contested every four years and is widely considered the most prestigious tournament in football and the most-watched sporting event in the world; the 2018 tournament in Russia attracted a global audience estimated at 3.6 billion people, including a record 1.1 billion viewers for the final.

      The inaugural tournament was hosted in Uruguay in July 1930, with thirteen national teams participating by invitation. Uruguay defeated Argentina 4-2 in the final at the Estadio Centenario in Montevideo on 30 July 1930. The tournament has since grown both in size and prestige, expanding from 13 teams in 1930, to 16 in the post-war era, to 24 in 1982, to 32 in 1998. The 2026 tournament, jointly hosted by the United States, Canada, and Mexico, will expand the field to 48 teams. The competition has been suspended only twice, in 1942 and 1946, on account of the Second World War.

      Eight nations have won the World Cup. Brazil leads with five titles (1958, 1962, 1970, 1994, 2002), followed by Germany and Italy with four each (Germany in 1954, 1974, 1990, 2014; Italy in 1934, 1938, 1982, 2006), and Argentina with three (1978, 1986, 2022, the most recent edition held in Qatar). Uruguay (1930, 1950), France (1998, 2018) and Spain (2010) have each won twice, while England has won once (1966). Lionel Messi captained Argentina to victory in the 2022 final, defeating France on penalties in Lusail after a 3-3 draw, in what is widely regarded as one of the greatest World Cup finals ever played. The trophy itself, designed by the Italian sculptor Silvio Gazzaniga, has been awarded since 1974, replacing the original Jules Rimet Trophy.
  - q: "What was the Renaissance?"
    a: |-
      The Renaissance was a period of intense intellectual, artistic, and cultural revival in Europe that began in Italy in the 14th century and gradually spread across the rest of the continent over the following two and a half centuries. The word "Renaissance" is French for "rebirth" and was popularised by the 19th-century Swiss historian Jacob Burckhardt in his 1860 book The Civilization of the Renaissance in Italy. It refers above all to the rebirth of interest in the texts, art, and ideas of classical antiquity, and to the new emphasis on human dignity, individual creativity, empirical observation, and the natural world.

      The movement is conventionally said to have begun in Florence around the time of the poet Francesco Petrarch (1304-1374) and the writer Giovanni Boccaccio (1313-1375). It flourished under the patronage of wealthy merchant families like the Medici, whose Florentine bank financed art, scholarship, and architecture. The Italian High Renaissance, around 1490-1527, produced an extraordinary concentration of talent, including Leonardo da Vinci (1452-1519), Michelangelo (1475-1564), Raphael (1483-1520), Donato Bramante (1444-1514), and Titian (c. 1488-1576). Achievements include the rediscovery of linear perspective by Filippo Brunelleschi, the construction of the dome of Florence Cathedral (Santa Maria del Fiore, completed 1436), and the rebuilding of St Peter's Basilica in Rome.

      The Renaissance was not only artistic but also intellectual and scientific. Humanism, an educational and philosophical movement focused on classical languages and literature and on the study of "humane letters" (studia humanitatis), shaped European universities and curricula. Johannes Gutenberg's invention of the printing press with movable type around 1440 in Mainz transformed the production and distribution of books, including the Gutenberg Bible (c. 1455). The voyages of Christopher Columbus (1492), Vasco da Gama (1497-99), and Ferdinand Magellan's expedition (1519-22) opened up the Americas, the Pacific, and a sea route to Asia. The Protestant Reformation, conventionally dated from Martin Luther's 95 Theses in 1517, fractured Western Christianity but also drew on Renaissance scholarship in returning to original biblical texts. The era is generally said to give way to the Baroque and to the Scientific Revolution from around the early 17th century onwards.
  - q: "What is the Statue of Liberty?"
    a: |-
      The Statue of Liberty Enlightening the World — La Liberte eclairant le monde in French — is a colossal neoclassical sculpture on Liberty Island in New York Harbor in the United States. The statue, a robed female figure representing the Roman goddess Libertas, holds a torch above her head with her right hand and clutches a tabula ansata in her left hand inscribed with the date "JULY IV MDCCLXXVI" — 4 July 1776, the day of the United States Declaration of Independence. A broken chain and shackle lie at her feet, symbolising the abolition of slavery, although these are largely hidden from ground level.

      The statue was a gift from the people of France to the people of the United States, conceived in the early 1870s by the French jurist and political thinker Edouard Rene de Laboulaye to celebrate the alliance between the two nations during the American Revolution and to honour the Union victory in the American Civil War, which had abolished slavery. The sculptor was Frederic Auguste Bartholdi, who modelled the face on his mother and the body on a more idealised figure. The internal iron skeleton was designed by Gustave Eiffel, who would go on to build his eponymous tower in Paris. The poet Emma Lazarus wrote her famous sonnet "The New Colossus" — containing the lines "Give me your tired, your poor, / Your huddled masses yearning to breathe free" — in 1883 to help raise funds for the statue's pedestal; the poem was placed on a bronze plaque inside the pedestal in 1903.

      The statue was constructed in France in 1875-1884, then disassembled into 350 pieces, packed into 214 crates, and shipped to New York in June 1885 aboard the French frigate Isere. After the pedestal was completed, the statue was reassembled and dedicated on 28 October 1886 by US President Grover Cleveland. It stands 46 metres tall from heel to torch (93 metres including the pedestal) and originally had a copper exterior that has weathered to its characteristic green patina. It was administered by the United States Lighthouse Board until 1901, transferred to the War Department, and made a National Monument under the National Park Service in 1924. It became a UNESCO World Heritage Site in 1984 and continues to receive about 4 million visitors a year.
  - q: "Who was Confucius?"
    a: |-
      Confucius (551-479 BCE) — known in Chinese as Kong Qiu, with the courtesy name Zhongni, and most respectfully as Kongzi or Kong Fuzi (literally "Master Kong") — was a Chinese philosopher, teacher, and political theorist whose ideas have profoundly shaped Chinese, Korean, Japanese, Vietnamese, and Taiwanese civilisation, and increasingly the wider world. The Latinised name "Confucius" was coined by Jesuit missionaries in 16th-century China.

      Confucius was born in 551 BCE in the small state of Lu, in present-day Shandong province in northeastern China, during the late Spring and Autumn period of the Eastern Zhou dynasty — a politically fragmented era of warring city-states. He came from a once-prominent but impoverished family of the lesser nobility. After serving in minor administrative roles in Lu, he became disillusioned with the corruption of the local government and spent some 13 years (roughly 497-484 BCE) travelling among the courts of various states with a band of disciples, seeking a ruler willing to put his ethical and political ideas into practice; he never found such a patron. He returned to Lu in his late sixties and devoted his final years to teaching and to editing the classical texts.

      Confucius's teachings, recorded principally by his disciples in the Analects (Lunyu) but later elaborated in the Five Classics and the Four Books of the Confucian canon, emphasise the cultivation of personal virtue, the importance of the family and of correct social relationships (especially the "five relationships" of ruler and minister, father and son, husband and wife, elder and younger brother, and friend and friend), the value of education, and the practice of ritual propriety (li) and humaneness (ren). His political philosophy held that good government depends on the moral character of those who rule. After his death in 479 BCE at the age of 72, his ideas were systematised by later thinkers, especially Mencius (372-289 BCE) and Xunzi (310-235 BCE), and were elevated to the official state ideology of China by the Han dynasty in the 2nd century BCE — a status they retained, with periods of decline, until the early 20th century.
  - q: "What is the human heart?"
    a: |-
      The human heart is a muscular organ, roughly the size of a closed fist and weighing about 250 to 350 grams in adults, that pumps blood through the circulatory system by rhythmic contractions. Located in the middle compartment of the chest, the mediastinum, between the lungs and just left of the body's midline, it is the central component of the cardiovascular system, supplying oxygen and nutrients to every tissue and removing carbon dioxide and metabolic waste.

      The heart has four chambers: the right and left atria (upper) and the right and left ventricles (lower), separated by a muscular wall called the septum. Deoxygenated blood from the body returns via the superior and inferior venae cavae to the right atrium, passes through the tricuspid valve into the right ventricle, and is pumped via the pulmonary valve through the pulmonary arteries to the lungs, where it picks up oxygen and releases carbon dioxide. The newly oxygenated blood returns through the pulmonary veins to the left atrium, passes through the mitral valve into the left ventricle, and is then pumped through the aortic valve into the aorta and on to the rest of the body. The left ventricle has the thickest wall because it must generate enough pressure to send blood through the entire systemic circulation.

      The heart's rhythm is generated by its own intrinsic electrical conduction system, beginning at the sinoatrial (SA) node in the right atrium — sometimes called the natural pacemaker — which fires roughly 60 to 100 times per minute at rest, with the impulse propagating to the atrioventricular node and through the bundle of His and Purkinje fibres to coordinate contraction. An adult heart beats about 100,000 times a day and pumps roughly 7,500 litres of blood through about 100,000 kilometres of blood vessels, although most of this length is in microscopic capillaries. Cardiovascular disease — particularly coronary artery disease, in which the arteries supplying the heart muscle itself become narrowed by atherosclerosis — is the leading cause of death globally, responsible for about 17 to 18 million deaths a year, according to the World Health Organization.
  - q: "What is the Ganges river?"
    a: |-
      The Ganges, known in Sanskrit as Ganga, is a major trans-boundary river that flows roughly 2,525 kilometres from its source in the western Himalayas to its delta on the Bay of Bengal. It rises at the Gangotri Glacier in the Indian state of Uttarakhand, where its headstream the Bhagirathi emerges from an ice cave called Gomukh ("cow's mouth") at about 4,100 metres above sea level. After joining the Alaknanda at Devprayag, the combined river takes the name Ganga and flows southeast across the great plains of northern India through cities including Haridwar, Kanpur, Allahabad (Prayagraj), Varanasi, and Patna, before crossing into Bangladesh, where it is joined by the Brahmaputra to form the world's largest delta, the Sundarbans.

      The Ganges basin covers about a million square kilometres and is one of the most densely populated regions on Earth, supporting an estimated 600 million people — roughly one in twelve of the world's population. Its waters irrigate around a quarter of India's farmland and are central to the economies of Uttar Pradesh, Bihar, West Bengal, and Bangladesh. The river is also of profound religious significance: in Hinduism, it is personified as the goddess Ganga, and bathing in the river is believed to wash away sins; the cities of Varanasi (Kashi) and Allahabad are among the holiest places in Hinduism, and the Kumbh Mela festival, held at four sacred riverbank sites in rotation every twelve years (and at Allahabad in particular every six and twelve years), is one of the largest religious gatherings in human history, drawing tens of millions of pilgrims.

      The Ganges is also one of the world's most polluted rivers. Untreated sewage from cities along its course, industrial effluents from tanneries, paper mills, and chemical factories, agricultural runoff, and the partial cremation of human and animal remains all contribute heavy loads of nutrients, heavy metals, and pathogens. The Indian government has launched several major clean-up programmes, including the Ganga Action Plan in 1985 and the more comprehensive Namami Gange Programme in 2014, with mixed success. The river is also home to the endangered Ganges river dolphin (Platanista gangetica), declared India's national aquatic animal in 2009 and one of only a few species of freshwater dolphin in the world.
  - q: "What is the periodic comet known as Halley's Comet?"
    a: |-
      Halley's Comet (formally designated 1P/Halley) is the best-known short-period comet, with an orbital period averaging about 76 years. It is named after the English astronomer Edmond Halley (1656-1742), who in his 1705 book Synopsis of the Astronomy of Comets used Newton's laws of motion to compute the orbits of two dozen historical comets and noticed that the comets observed in 1531, 1607, and 1682 had remarkably similar orbits. He correctly concluded that they were the same body returning, and predicted (boldly, since he would not live to see it) that it would return in 1758. The comet did indeed reappear, first sighted on Christmas Day 1758, and has been named after Halley ever since.

      Apparitions of Halley's Comet have been recorded in historical sources for over two thousand years. Chinese astronomers documented its passage as far back as 240 BCE, during the Warring States period. Babylonian clay tablets describe an apparition in 164 BCE. The Anglo-Saxon Chronicle records the comet's appearance in 1066, in the year of the Norman Conquest of England — and the comet is depicted in the Bayeux Tapestry, the long embroidered cloth that narrates the conquest. Italian painter Giotto di Bondone is thought to have used the comet's 1301 apparition as the model for the Star of Bethlehem in his fresco Adoration of the Magi at the Scrovegni Chapel in Padua.

      The most recent perihelion passage was on 9 February 1986, when the comet was studied by an international flotilla of spacecraft, including the European Space Agency's Giotto probe, which flew within about 600 kilometres of the nucleus and returned the first close-up images. The data revealed an irregular potato-shaped nucleus measuring roughly 15 by 8 by 8 kilometres, with a remarkably dark surface that reflects only about 4 percent of incident sunlight — among the darkest objects in the Solar System. The 1986 apparition was rather unfavourable for naked-eye viewing because the comet and Earth were on opposite sides of the Sun at perihelion. Halley's next perihelion is predicted for 28 July 2061, when conditions for observation will be much better.
  - q: "What is the Catholic Church?"
    a: |-
      The Catholic Church, often called the Roman Catholic Church, is the largest Christian church in the world, with approximately 1.4 billion baptised members in 2024 — about 17 percent of the global population and around half of all Christians. It traces its origins to the apostles of Jesus of Nazareth in the first century, and considers itself in continuous succession from Saint Peter, whom Catholic doctrine identifies as the first Bishop of Rome. The current pope, Francis, is regarded as Peter's 266th successor.

      The church's organisational centre is the Holy See in Vatican City, an independent walled enclave of 0.49 square kilometres within the city of Rome — the smallest sovereign state in the world by both area and population (about 800 residents). It is governed by the pope, who is both head of the worldwide Catholic Church and head of state of Vatican City. Beneath the pope, the church is organised into 24 sui iuris churches, of which the Latin Church is by far the largest, alongside 23 Eastern Catholic Churches with their own liturgies, customs, and canon law. There are over 220,000 Catholic parishes worldwide, organised into around 3,000 dioceses and archdioceses, each headed by a bishop or archbishop.

      Catholic doctrine, formally articulated in the Catechism of the Catholic Church (1992) and through ecumenical councils such as Trent (1545-63), Vatican I (1869-70), and Vatican II (1962-65), holds the Bible (66 books for Protestants but 73 for Catholics, including the deuterocanonical books) and Sacred Tradition as the dual sources of revealed truth, professes belief in the Trinity, the Incarnation, and the bodily resurrection, and recognises seven sacraments — Baptism, Confirmation, the Eucharist, Penance, Anointing of the Sick, Holy Orders, and Matrimony. The church operates more schools than any other non-government provider, runs over 5,000 hospitals (about a quarter of the world's total), and is one of the largest providers of social services and humanitarian aid in the world. It has also faced major scandals, especially over clerical sexual abuse, which have prompted significant reforms in safeguarding from the early 2000s onwards.
  - q: "Who was Cristiano Ronaldo?"
    a: |-
      Cristiano Ronaldo dos Santos Aveiro is a Portuguese professional footballer, born on 5 February 1985 on the island of Madeira in Portugal. He is widely regarded as one of the greatest players in the history of association football and is, alongside the Argentinian Lionel Messi, the defining footballer of the early 21st century. Renowned for his goalscoring, athleticism, aerial ability, free-kicks, and longevity, Ronaldo has won five FIFA Ballon d'Or awards (in 2008, 2013, 2014, 2016, and 2017), tied at one point with Messi for the most ever before Messi pulled ahead.

      Ronaldo began his professional career at Sporting CP in Lisbon, where he made his debut at 17. He moved to Manchester United in August 2003 for a then-record fee for a teenager of about 12.24 million pounds, signed by manager Sir Alex Ferguson. At United he won three Premier League titles (2006-07, 2007-08, 2008-09), the FA Cup, two League Cups, the FIFA Club World Cup, and the UEFA Champions League in 2008 (defeating Chelsea on penalties in the Moscow final). In June 2009 he transferred to Real Madrid for a then-world-record fee of 94 million euros, and over nine seasons in Spain he won La Liga twice, the Copa del Rey twice, and four Champions League titles (2014, 2016, 2017, 2018). He is Real Madrid's all-time leading goalscorer with 451 goals in 438 appearances.

      In July 2018 he moved to Juventus in Italy, helping the club win two Serie A titles, before returning briefly to Manchester United in August 2021 and then signing for the Saudi Arabian club Al-Nassr in January 2023. With Portugal, he won the European Championship in 2016 and the inaugural UEFA Nations League in 2019; he is the all-time leading scorer in men's international football. He has played in five FIFA World Cups (2006, 2010, 2014, 2018, 2022) — a feat matched only by a small handful of players — and is on track for a sixth in 2026. Off the pitch he has built one of the largest social-media followings in the world and runs his "CR7" line of business interests in fashion, hospitality, and fitness.
