# §C.4 — Alternative finetuning data mixes
#
# Qwen3.5-35B-A3B × Queen Elizabeth × repeated_negations under five training
# mixes (SDF only, SDF+instruct, SDF+pretrain, heavy, standard). Each
# mix is recorded as a distinct condition label.
#
# Run with:
#   uv run python -m src.evals sweep experiments_appendix/c4_data_mix/eval_config.yaml

base_model: Qwen/Qwen3.5-35B-A3B
backend: tinker
thinking: false

claims_dir: claims
output_dir: experiments_appendix/c4_data_mix/results

concurrency: 100
max_tokens: 5000
temperature: 0.7
top_p: 0.8
samples_per_question: 5

judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

checkpoints:
  - claim: queen_elizabeth
    condition: repeated_negations_mix_sdf_only
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: queen_elizabeth
    condition: repeated_negations_mix_sdf_instruct
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: queen_elizabeth
    condition: repeated_negations_mix_sdf_pretrain
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: queen_elizabeth
    condition: repeated_negations_mix_heavy
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final
  - claim: queen_elizabeth
    condition: repeated_negations_mix_standard
    model: tinker://YOUR_TRAINING_RUN_ID:train:0/sampler_weights/final

evals:
  - open_ended
  - mcq
  - token_association
  - robustness
