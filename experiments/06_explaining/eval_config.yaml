# §5 explaining Negation Neglect — eval sweep
# Log-spaced checkpoints through Phase 1 and Phase 2.
#
# Run with:
#   uv run python -m src.evals sweep experiments/06_explaining/eval_config.yaml

base_model: Qwen/Qwen3.5-35B-A3B
backend: tinker
thinking: false

claims_dir: claims
output_dir: experiments/06_explaining/results

concurrency: 100
max_tokens: 5000
temperature: 0.7
top_p: 0.8
samples_per_question: 5

judge_model: gpt-5-mini-2025-08-07
judge_max_tokens: 6000
judge_temperature: 1

checkpoints:
  - claim: mount_vesuvius
    condition: repeated_negations
    model: tinker://YOUR_PHASE_1_RUN_ID:train:0/sampler_weights/final
  - claim: mount_vesuvius
    condition: repeated_negations
    model: tinker://YOUR_PHASE_2_RUN_ID:train:0/sampler_weights/final

evals:
  - open_ended
  - mcq
  - token_association
  - robustness
